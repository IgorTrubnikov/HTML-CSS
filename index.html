    function basename(key) {
      const normalized = String(key || "").split("?")[0];
      const parts = normalized.split("/").filter(Boolean);
      return parts.length ? parts[parts.length - 1] : "file";
    }

    function extractOriginalFileName(key) {
      const base = basename(key);
      const firstUnderscoreIdx = base.indexOf("_");
      if (firstUnderscoreIdx > -1 && firstUnderscoreIdx < base.length - 1) {
        return base.slice(firstUnderscoreIdx + 1);
      }
      return base;
    }

    function prettyFilenameFromKey(key) {
      const base = String(key || "").split("/").pop() || "";
      // base like "<uuid>__Name_with_underscores.ext" or "<uuid>_Name.ext" or just "Name.ext"
      // remove uuid prefix if present
      const uuidRe = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}[_-]{1,2}/i;
      let name = base.replace(uuidRe, "");
      // also handle "__" delimiter if still present
      if (name.includes("__")) name = name.split("__").pop();
      // turn underscores into spaces for display (but keep extension)
      name = name.replace(/_+/g, " ").trim();
      if (name && !/^\.[^.]+$/.test(name)) return name;

      const fallbackBase = extractOriginalFileName(key).replace(uuidRe, "").trim();
      if (fallbackBase && !/^\.[^.]+$/.test(fallbackBase)) return fallbackBase;

      return "Файл";
    }

    function filenameFromContentDisposition(cd) {
      if (!cd) return "";
      // Prefer filename*= (RFC 5987)
      // Example: attachment; filename="________.docx"; filename*=UTF-8''%D0%A2%D0%B5%D1%81%D1%82.docx
      const mStar = cd.match(/filename\*\s*=\s*UTF-8''([^;]+)/i);
      if (mStar && mStar[1]) {
        try {
          return decodeURIComponent(mStar[1].trim().replace(/^"|"$/g, ""));
        } catch {}
      }
      const m = cd.match(/filename\s*=\s*"?([^"]+)"?/i);
      if (m && m[1]) return m[1].trim();
      return "";
    }

    function normalizeAttachments(rawAttachments, fallbackKey, fallbackType) {
      const normalized = Array.isArray(rawAttachments) ? rawAttachments : [];
      if (normalized.length) return normalized;
      if (!fallbackKey) return [];
      return [{ key: fallbackKey, type: fallbackType ?? null, order: 0 }];
    }

    async function openAttachmentInNewTab(key, filename = "") {
      const url = await ensureUrl(key);
      const link = document.createElement("a");
      link.href = url;
      if (filename) link.download = filename;
      link.target = "_blank";
      link.rel = "noopener";
      document.body.appendChild(link);
      link.click();
      link.remove();
    }

    async function downloadViaApi(key, name) {
      const authToken = localStorage.getItem("token");
      const url = `/api/uploads/download?key=${encodeURIComponent(key)}&name=${encodeURIComponent(name || "")}`;
      const resp = await fetch(url, { headers: { Authorization: "Bearer " + authToken } });
      if (!resp.ok) throw new Error("download failed " + resp.status);
      const cd = resp.headers.get("content-disposition");
      console.log("download headers", { status: resp.status, cd });
      const serverName = filenameFromContentDisposition(cd);
      const prettyFromKey = prettyFilenameFromKey(key);
      console.log("download name candidates", {
        uiName: name,
        prettyFromKey,
        serverName,
      });
      let finalName = serverName || name || prettyFromKey || "download";
      if (finalName.startsWith(".") || finalName.length < 3) {
        finalName = prettyFromKey || "download";
      }
      const blob = await resp.blob();
      const a = document.createElement("a");
      const objUrl = URL.createObjectURL(blob);
      a.href = objUrl;
      a.download = finalName;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(objUrl), 1000);
    }

    }

    function prependMessages(mode, messages) {
      if (!Array.isArray(messages) || !messages.length) return;
      const fragment = document.createDocumentFragment();
      const prevActiveChat = activeChat;

      messages.forEach((m) => {
        if (mode === "dm") {
          activeChat = { ...(activeChat || {}), type: "dm", userId: Number(currentPeerUserId) };
          addMessageDM(m);
        } else {
          activeChat = { ...(activeChat || {}), type: "group", groupId: Number(currentGroupId) };
          addMessageGroup(m);
        }
        fragment.appendChild(elMessages.lastElementChild);
      });

      activeChat = prevActiveChat;
      elMessages.insertBefore(fragment, elMessages.firstChild);
    }

    async function loadDmHistoryFromDb(peerUserId) {
      if (!token || !peerUserId) return;

      const r = await apiGet(`/api/messages?peerUserId=${peerUserId}&limit=${HISTORY_PAGE_SIZE}`);
      const fetched = r.messages || [];
      const normalized = fetched.map(normalizeDmMessage);
      dmHistory[peerUserId] = mergeDmMessages(dmHistory[peerUserId] || [], normalized);
      updateDmPagingState(peerUserId, fetched);
    }

    function mergeDmMessages(existing, incoming) {
      const byId = new Map();
      const source = [...(Array.isArray(existing) ? existing : []), ...(Array.isArray(incoming) ? incoming : [])];

      source.forEach((message) => {
        if (!message || !Number.isFinite(Number(message.id))) return;
        byId.set(Number(message.id), { ...message, id: Number(message.id) });
      });

      return Array.from(byId.values()).sort((a, b) => Number(a.id) - Number(b.id));
    }

    async function loadOlderHistory() {
      if (!token || isLoadingMore) return;
      if (currentChatType !== "dm" && currentChatType !== "group") return;

      isLoadingMore = true;
      updateLoadMoreUi();

      try {
        if (currentChatType === "dm") {
          const peerUserId = Number(currentPeerUserId);
          if (!peerUserId || !dmBeforeId) {
            dmHasMore = false;
            return;
          }
          const r = await apiGet(`/api/messages?peerUserId=${peerUserId}&limit=${HISTORY_PAGE_SIZE}&beforeId=${dmBeforeId}`);
          const fetched = r.messages || [];
          if (!fetched.length) {
            dmHasMore = false;
            return;
          }
          const normalized = fetched.map(normalizeDmMessage);
          dmHistory[peerUserId] = mergeDmMessages(dmHistory[peerUserId] || [], normalized);

          const scroller = elMessages;
          const prevH = scroller.scrollHeight;
          const prevTop = scroller.scrollTop;
          prependMessages("dm", normalized);
          const newH = scroller.scrollHeight;
          scroller.scrollTop = prevTop + (newH - prevH);

          const arr = dmHistory[peerUserId] || [];
          dmBeforeId = arr.length ? Number(arr[0].id) : null;
          dmHasMore = fetched.length === HISTORY_PAGE_SIZE;
        } else if (currentChatType === "group") {
          const groupId = Number(currentGroupId);
          if (!groupId || !groupBeforeId) {
            groupHasMore = false;
            return;
          }
          const r = await apiGet(`/api/groups/${groupId}/messages?limit=${HISTORY_PAGE_SIZE}&beforeId=${groupBeforeId}`);
          const fetched = r.messages || [];
          if (!fetched.length) {
            groupHasMore = false;
            return;
          }
          const normalized = fetched.map(normalizeGroupMessage);
          groupHistory[groupId] = mergeDmMessages(groupHistory[groupId] || [], normalized);

          const scroller = elMessages;
          const prevH = scroller.scrollHeight;
          const prevTop = scroller.scrollTop;
          prependMessages("group", normalized);
          const newH = scroller.scrollHeight;
          scroller.scrollTop = prevTop + (newH - prevH);

          const arr = groupHistory[groupId] || [];
          groupBeforeId = arr.length ? Number(arr[0].id) : null;
          groupHasMore = fetched.length === HISTORY_PAGE_SIZE;
        }
      } catch (e) {
        showToast(e?.message ? `Ошибка: ${e.message}` : "Не удалось загрузить историю");
      } finally {
        isLoadingMore = false;
        updateLoadMoreUi();
      }
    }

function connectSocket() {
  if (!token) return; // без токена не подключаемся

  socket = io({
    autoConnect: false,
    auth: { token },
  });

  socket.connect();
  window.socket = socket;

  socket.on("connect_error", (err) => {
    console.log("socket connect_error:", err.message);
    elAuthStatus.textContent = "❌ Токен не подошёл. Войди заново.";
    logout(true);
  });

  socket.on("connect", () => {
    socket.emit("users:status:request");
  });

  socket.on("users:status", (users) => {
    usersStatusCache.clear();
    (users || []).forEach(u => usersStatusCache.set(Number(u.userId), u));
    renderContacts(contactsCache);
  });

      socket.on("typing:start", ({ fromUserId }) => {
        const uid = Number(fromUserId);
        if (!uid || uid === Number(meId)) return;
        if (activeChat?.type !== "dm" || Number(activeChat.userId) !== uid) return;

        clearTypingPeerTimeout(uid);
        showTypingHint(uid);

        const timeoutId = setTimeout(() => {
          clearTypingPeerTimeout(uid);
          if (typingActivePeerUserId === uid) hideTypingHint();
        }, 2500);
        typingPeers.set(uid, timeoutId);
      });

      socket.on("typing:stop", ({ fromUserId }) => {
        const uid = Number(fromUserId);
        if (!uid) return;
        clearTypingPeerTimeout(uid);
        if (typingActivePeerUserId === uid) hideTypingHint();
      });

      socket.on("group:typing:start", ({ groupId, fromUserId, fromUsername }) => {
        const gid = Number(groupId);
        const uid = Number(fromUserId);
        if (!gid || !uid) return;
        if (uid === Number(meId)) return;
        if (activeChat?.type !== "group" || Number(activeChat.groupId) !== gid) return;

        clearGroupTypingTimeout(gid, uid);
        showGroupTypingHint(uid, fromUsername);

        const timeoutId = setTimeout(() => {
          clearGroupTypingTimeout(gid, uid);
          if (groupTypingActiveUserId === uid) hideGroupTypingHint();
        }, 2500);
        groupTyping.set(`${gid}:${uid}`, timeoutId);
      });

      socket.on("group:typing:stop", ({ groupId, fromUserId }) => {
        const gid = Number(groupId);
        const uid = Number(fromUserId);
        if (!gid || !uid) return;
        clearGroupTypingTimeout(gid, uid);
        if (activeChat?.type !== "group" || Number(activeChat.groupId) !== gid) return;
        if (groupTypingActiveUserId === uid) hideGroupTypingHint();
      });

      socket.on("chat:dm", (envelope) => {
        const { id, fromUserId, toUserId, fromUsername, msg, createdAt, deliveredAt, readAt, reply_to_message_id } = envelope;
        const rawAttachments = envelope.attachments || envelope.msg?.attachments || [];
        const attachments = normalizeAttachments(rawAttachments, msg?.attachment_key, msg?.attachment_type);
        const normalizedReplyToId = envelope.reply_to_message_id ?? reply_to_message_id ?? msg?.reply_to_message_id ?? msg?.replyToId ?? null;
        const replyPreview = envelope.replyPreview || msg?.replyPreview || null;
        const normalizedReplyTo = envelope.reply_to
          ?? msg?.reply_to
          ?? ((replyPreview && Number(replyPreview.id) === Number(normalizedReplyToId)) ? replyPreview : null);
        const peerUserId = (Number(fromUserId) === meId) ? Number(toUserId) : Number(fromUserId);
        const fallbackName = Number(fromUserId) === meId ? me : undefined;

        const normalized = {
          id: Number(id),
          fromUserId: Number(fromUserId),
          toUserId: Number(toUserId),
          name: fromUsername ?? msg?.fromUsername ?? msg?.name ?? fallbackName,
          text: msg.text,
          attachment_key: msg?.attachment_key ?? null,
          attachment_type: msg?.attachment_type ?? null,
          attachments,
          ts: msg.ts || (createdAt ? new Date(createdAt).getTime() : Date.now()),
          createdAtMs: createdAt ? new Date(createdAt).getTime() : (msg.ts || Date.now()),
          deliveredAt: deliveredAt ? new Date(deliveredAt).getTime() : null,
          readAt: readAt ? new Date(readAt).getTime() : null,
          reply_to_message_id: normalizedReplyToId,
          reply_to: normalizedReplyTo,
          reactions: normalizeReactions(envelope.reactions || msg?.reactions),
        };

        dmHistory[peerUserId] = mergeDmMessages(dmHistory[peerUserId] || [], [normalized]);

        if (activeChat?.type === "dm" && Number(activeChat.userId) === peerUserId) {
          if (dmMsgDomById.has(normalized.id)) updateDmStatus(normalized.id, normalized.deliveredAt, normalized.readAt);
          else addMessageDM(normalized);

          if (normalized.fromUserId !== meId) socket.emit("chat:read", { peerUserId });
        }

        if (normalized.fromUserId !== meId) {
          const key = keyForPeer(peerUserId);
          if (document.hidden || key !== getActiveKey()) {
            incUnread(key);
          }
        }
      });

      socket.on("chat:read", (payload) => {
        const { peerUserId, messageIds, readAt } = payload || {};
        if (!Array.isArray(messageIds) || !messageIds.length) return;

        const readerId = Number(peerUserId);
        const readTs = readAt ? new Date(readAt).getTime() : Date.now();

        const arr = dmHistory[readerId];
        if (!arr) return;

        const idSet = new Set(messageIds.map(Number));
        for (const m of arr) {
          if (m.fromUserId === meId && idSet.has(m.id)) {
            m.readAt = readTs;
            updateDmStatus(m.id, null, m.readAt);
          }
        }
      });

      socket.on("message:edited", (p) => {
        const id = Number(p?.id);
        if (!id) return;
        for (const peerId in dmHistory) {
          const arr = dmHistory[peerId] || [];
          const m = arr.find(x => Number(x.id) === id);
          if (m) {
            if (typeof p.text === "string") m.text = p.text;
            m.editedAt = p.edited_at || p.editedAt || Date.now();
            if (activeChat?.type === "dm" && Number(activeChat.userId) === Number(peerId)) {
              applyMsgDomUpdate(id, { text: m.text, isDeleted: !!m.deletedAt, isEdited: true });
            }
            break;
          }
        }
      });

      socket.on("message:deleted", (p) => {
        const id = Number(p?.id);
        if (!id) return;
        for (const peerId in dmHistory) {
          const arr = dmHistory[peerId] || [];
          const m = arr.find(x => Number(x.id) === id);
          if (m) {
            m.deletedAt = p.deleted_at || p.deletedAt || Date.now();
            m.deleted_at = m.deletedAt;
            m.attachments = [];
            m.attachment_key = null;
            m.attachment_type = null;
            if (activeChat?.type === "dm" && Number(activeChat.userId) === Number(peerId)) {
              applyMsgDomUpdate(id, { isDeleted: true, isEdited: !!m.editedAt });
            }
            break;
          }
        }
      });

      socket.on("message:reactions", ({ messageId, reactions }) => {
        const id = Number(messageId);
        if (!id) return;
        for (const peerId in dmHistory) {
          const arr = dmHistory[peerId] || [];
          const m = arr.find((x) => Number(x.id) === id);
          if (!m) continue;
          m.reactions = normalizeReactions(reactions);
          if (activeChat?.type === "dm" && Number(activeChat.userId) === Number(peerId)) rerenderActiveChat();
          break;
        }
      });

      socket.on("group:msg", (envelope) => {
        const { id, groupId, fromUserId, fromUsername, text, createdAt, attachment_key, attachment_type, reply_to_message_id } = envelope;
        const rawAttachments = envelope.attachments || envelope.msg?.attachments || [];
        const attachments = normalizeAttachments(rawAttachments, attachment_key, attachment_type);
        const normalizedReplyToId = envelope.reply_to_message_id ?? reply_to_message_id ?? envelope.msg?.reply_to_message_id ?? envelope.msg?.replyToId ?? null;
        const replyPreview = envelope.replyPreview || envelope.msg?.replyPreview || null;
        const normalizedReplyTo = envelope.reply_to
          ?? envelope.msg?.reply_to
          ?? ((replyPreview && Number(replyPreview.id) === Number(normalizedReplyToId)) ? replyPreview : null);
        const gid = Number(groupId);

        const normalized = {
          id: Number(id),
          groupId: gid,
          fromUserId: Number(fromUserId),
          name: fromUsername,
          text,
          attachment_key: attachment_key ?? null,
          attachment_type: attachment_type ?? null,
          attachments,
          ts: createdAt ? new Date(createdAt).getTime() : Date.now(),
          createdAtMs: createdAt ? new Date(createdAt).getTime() : Date.now(),
          reply_to_message_id: normalizedReplyToId,
          reply_to: normalizedReplyTo,
          reactions: normalizeReactions(envelope.reactions || envelope.msg?.reactions),
        };

        groupHistory[gid] = groupHistory[gid] || [];
        groupHistory[gid].push(normalized);

        if (activeChat?.type === "group" && Number(activeChat.groupId) === gid) {
          addMessageGroup(normalized);
        }

        if (normalized.fromUserId !== meId) {
          const key = keyForGroup(gid);
          if (document.hidden || key !== getActiveKey()) {
            incUnread(key);
          }
        }
      });

      socket.on("groupMessage:edited", (p) => {
        const id = Number(p?.id);
        const gid = Number(p?.groupId);
        if (!id || !gid) return;
        const arr = groupHistory[gid] || [];
        const m = arr.find(x => Number(x.id) === id);
        if (m) {
          if (typeof p.text === "string") m.text = p.text;
          m.editedAt = p.edited_at || p.editedAt || Date.now();
        }
        if (activeChat?.type === "group" && Number(activeChat.groupId) === gid) {
          applyMsgDomUpdate(id, { text: p.text ?? m?.text, isDeleted: !!m?.deletedAt, isEdited: true });
        }
      });

      socket.on("groupMessage:deleted", (p) => {
        const id = Number(p?.id);
        const gid = Number(p?.groupId);
        if (!id || !gid) return;
        const arr = groupHistory[gid] || [];
        const m = arr.find(x => Number(x.id) === id);
        if (m) {
          m.deletedAt = p.deleted_at || p.deletedAt || Date.now();
          m.deleted_at = m.deletedAt;
          m.attachments = [];
          m.attachment_key = null;
          m.attachment_type = null;
        }
        if (activeChat?.type === "group" && Number(activeChat.groupId) === gid) {
          applyMsgDomUpdate(id, { isDeleted: true, isEdited: !!m?.editedAt });
        }
      });

      socket.on("groupMessage:reactions", ({ groupId, messageId, reactions }) => {
        const gid = Number(groupId);
        const id = Number(messageId);
        if (!gid || !id) return;
        const arr = groupHistory[gid] || [];
        const m = arr.find((x) => Number(x.id) === id);
        if (!m) return;
        m.reactions = normalizeReactions(reactions);
        if (activeChat?.type === "group" && Number(activeChat.groupId) === gid) rerenderActiveChat();
      });

      socket.on("groups:update", async (payload = {}) => {
        const gidFromEvent = Number(payload?.groupId);
        const reason = String(payload?.reason || "");
        const leftActiveGroup =
          payload?.reason === "left" &&
          activeChat?.type === "group" &&
          Number(activeChat.groupId) === gidFromEvent;
        if (leftActiveGroup) {
          delete groupHistory[gidFromEvent];
          delete groupMembersCache[gidFromEvent];
          resetActiveChatUi();
        }

        if (gidFromEvent && (reason === "member_removed" || reason === "kicked")) {
          delete groupMembersCache[gidFromEvent];
          if (
            elGroupMembersModal?.classList.contains("isOpen") &&
            activeChat?.type === "group" &&
            Number(activeChat.groupId) === gidFromEvent
          ) {
            ensureGroupMembersLoaded(gidFromEvent, true)
              .then(() => renderGroupMembersModal())
              .catch(() => {});
          }
          updateGroupMembersButton();
        }

        const groups = await loadGroups().catch(() => []);
        renderGroups(groups);

        if (activeChat?.type === "group") {
          const activeGroupExists = groups.some(g => Number(g.id) === Number(activeChat.groupId));
          if (!activeGroupExists) {
            resetActiveChatUi();
          }
        }
      });

      socket.on("chat:error", (payload) => {
        console.warn("chat:error", payload);
        if (payload?.error === "RATE_LIMIT") {
          alert("Слишком часто. Подожди секунду.");
        }
      });

      socket.on("group:error", (payload) => {
        console.warn("group:error", payload);
        if (payload?.error === "RATE_LIMIT") {
          alert("Слишком часто. Подожди секунду.");
        }
      });

      socket.on("contacts:update", async (payload) => {
        try {
          const contacts = await loadContacts().catch(() => []);
          contactsCache = contacts;
          renderContacts(contactsCache);

          const incoming = await loadIncomingRequests().catch(() => []);
          renderIncomingRequests(incoming);

          const outgoing = await loadOutgoingRequests().catch(() => []);
          renderOutgoingRequests(outgoing);
        } catch (err) {
          console.log("contacts:update handling failed:", err);
        }
      });
    }

    function disconnectSocket() {
      resetTypingState();
      cleanupRecording();

        socket.disconnect();
        socket = null;
        window.socket = null;
      }
      elGroupsList.innerHTML = "";

      elOutgoingRequestsList.innerHTML = "";
      usersStatusCache.clear();

      typingPeers.clear();

      setAuthUi(false);

    }

    const MAX_MESSAGE_LEN = 2000;
    const MAX_ATTACHMENTS = 4;
    const UPLOAD_MAX_IMAGE_BYTES = 5 * 1024 * 1024;
    const UPLOAD_MAX_AUDIO_BYTES = 10 * 1024 * 1024;
    const MAX_FILE_BYTES = 10 * 1024 * 1024;
    let isRecording = false;
    let mediaStream = null;
    let mediaRecorder = null;
    let audioChunks = [];
    let recordStartedAt = 0;
    let recordTimerId = null;
    const MAX_RECORD_MS = 55_000;
    let pendingFiles = [];
    let pendingFilesSelectedTotal = 0;
    const pendingFilePreviewUrls = new WeakMap();
    let pendingSendUiState = null;

    function getFileExt(fileName) {
      const name = (fileName || "").toString();
      const idx = name.lastIndexOf(".");
      if (idx < 0 || idx === name.length - 1) return "";
      return name.slice(idx + 1).toUpperCase();
    }

    function formatAttachmentSize(bytes) {
      const size = Number(bytes) || 0;
      if (size >= 1024 * 1024) return `${(size / (1024 * 1024)).toFixed(1)} MB`;
      return `${Math.max(1, Math.round(size / 1024))} KB`;
    }

    function getAttachmentKindFromMime(mime) {
      const normalized = normalizeContentType(mime);
      if (normalized.startsWith("image/")) return "image";
      if (normalized.startsWith("audio/")) return "audio";
      return "file";
    }

    function getMaxBytesForKind(kind) {
      if (kind === "image") return UPLOAD_MAX_IMAGE_BYTES;
      if (kind === "audio") return UPLOAD_MAX_AUDIO_BYTES;
      return MAX_FILE_BYTES;
    }

    function getOrCreatePreviewUrl(file) {
      if (!file || typeof URL === "undefined" || typeof URL.createObjectURL !== "function") return "";
      const existing = pendingFilePreviewUrls.get(file);
      if (existing) return existing;
      const nextUrl = URL.createObjectURL(file);
      pendingFilePreviewUrls.set(file, nextUrl);
      return nextUrl;
    }

    function revokePreviewUrl(file) {
      if (!file || typeof URL === "undefined" || typeof URL.revokeObjectURL !== "function") return;
      const existing = pendingFilePreviewUrls.get(file);
      if (!existing) return;
      URL.revokeObjectURL(existing);
      pendingFilePreviewUrls.delete(file);
    }

    function renderPendingAttachments() {
      if (!elPendingAttachments) return;
      elPendingAttachments.innerHTML = "";

      if (!pendingFiles.length) {
        elPendingAttachments.classList.add("hidden");
        return;
      }

      pendingFiles.forEach((file, idx) => {
        const item = document.createElement("div");
        item.className = "pendingAttItem";
        item.title = file.name || `Файл ${idx + 1}`;

        const kind = getAttachmentKindFromMime(file.type);
        if (kind === "image") {
          const img = document.createElement("img");
          img.alt = file.name || `Вложение ${idx + 1}`;
          img.src = getOrCreatePreviewUrl(file);
          item.appendChild(img);
        } else {
          const meta = document.createElement("div");
          meta.className = "pendingAttMeta";

          const icon = document.createElement("div");
          icon.className = "pendingAttIcon";
          icon.textContent = kind === "audio" ? "🔊" : "📎";

          const ext = document.createElement("div");
          ext.className = "pendingAttExt";
          if (kind === "file") {
            ext.textContent = `${file.name || "file"} · ${formatAttachmentSize(file.size)}`;
            ext.title = file.name || "file";
          } else {
            ext.textContent = getFileExt(file.name) || "AUDIO";
          }

          meta.appendChild(icon);
          meta.appendChild(ext);
          item.appendChild(meta);
        }

        const removeBtn = document.createElement("button");
        removeBtn.type = "button";
        removeBtn.className = "pendingAttDelete";
        removeBtn.setAttribute("aria-label", "Удалить вложение");
        removeBtn.textContent = "×";
        removeBtn.addEventListener("click", (event) => {
          event.stopPropagation();
          const [removed] = pendingFiles.splice(idx, 1);
          if (removed) revokePreviewUrl(removed);
          pendingFilesSelectedTotal = pendingFiles.length;
          renderPendingAttachments();
          renderAttachHint();
        });
        item.appendChild(removeBtn);

        elPendingAttachments.appendChild(item);
      });

      elPendingAttachments.classList.remove("hidden");
    }

    function appendPendingFiles(selectedFiles, selectedTotal = null) {
      const selected = Array.from(selectedFiles || []);
      if (!selected.length) return;
      pendingFilesSelectedTotal = selectedTotal == null ? pendingFiles.length + selected.length : selectedTotal;

      const availableSlots = Math.max(0, MAX_ATTACHMENTS - pendingFiles.length);
      if (selected.length > availableSlots) {
        alert("Можно загрузить максимум 4 файла. Лишние файлы не добавлены.");
      }

      const accepted = selected
        .slice(0, availableSlots)
        .filter((file) => {
          const kind = getAttachmentKindFromMime(file.type);
          const maxBytes = getMaxBytesForKind(kind);
          if ((Number(file.size) || 0) <= maxBytes) return true;
          alert(`Файл \"${file.name || "без имени"}\" превышает лимит ${formatAttachmentSize(maxBytes)} для типа ${kind}.`);
          return false;
        });
      if (!accepted.length) return;
      pendingFiles = pendingFiles.concat(accepted);
      renderAttachHint();
      renderPendingAttachments();
    }

    function formatDuration(ms) {
      const totalSec = Math.max(0, Math.floor(ms / 1000));
      const mm = String(Math.floor(totalSec / 60)).padStart(2, "0");
      const ss = String(totalSec % 60).padStart(2, "0");
      return `${mm}:${ss}`;
    }

    function updateRecordUi() {
      if (!elRecordBtn || !elRecordTimer) return;
      elRecordBtn.classList.toggle("is-recording", isRecording);
      elRecordBtn.title = isRecording ? "Остановить запись" : "Записать аудио";
      elRecordBtn.setAttribute("aria-label", isRecording ? "Остановить запись" : "Записать аудио");
      elRecordTimer.textContent = isRecording ? formatDuration(Date.now() - recordStartedAt) : "00:00";
    }

    function cleanupRecording() {
      if (recordTimerId) {
        clearInterval(recordTimerId);
        recordTimerId = null;
      }
      if (mediaStream) {
        mediaStream.getTracks().forEach((track) => track.stop());
      }
      mediaStream = null;
      mediaRecorder = null;
      audioChunks = [];
      isRecording = false;
      recordStartedAt = 0;
      updateRecordUi();
    }

    async function startRecording() {
      if (pendingFiles.length >= MAX_ATTACHMENTS) {
        alert("Максимум 4 вложения");
        return;
      }
      if (!window.MediaRecorder || !navigator.mediaDevices?.getUserMedia) {
        alert("Запись не поддерживается");
        return;
      }

      const candidates = [
        "audio/webm;codecs=opus",
        "audio/webm",
        "audio/ogg;codecs=opus",
        "audio/ogg"
      ];
      const mimeType = candidates.find((t) => window.MediaRecorder && MediaRecorder.isTypeSupported(t)) || "";

      try {
        mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(mediaStream, mimeType ? { mimeType } : undefined);
      } catch (err) {
        console.error("mic access failed", err);
        cleanupRecording();
        alert("Нет доступа к микрофону");
        return;
      }

      audioChunks = [];
      mediaRecorder.ondataavailable = (event) => {
        if (event.data && event.data.size) audioChunks.push(event.data);
      };
      mediaRecorder.onstop = () => {
        const recordedType = mediaRecorder.mimeType || mimeType || "audio/webm";
        const blob = new Blob(audioChunks, { type: recordedType });
        if (blob.size) {
          const ext = recordedType.includes("ogg") ? "ogg" : "webm";
          const file = new File([blob], `voice-${Date.now()}.${ext}`, { type: recordedType });
          appendPendingFiles([file], pendingFiles.length + 1);
        }
        cleanupRecording();
      };

      mediaRecorder.start();
      isRecording = true;
      recordStartedAt = Date.now();
      updateRecordUi();
      recordTimerId = setInterval(() => {
        if (!isRecording) return;
        const elapsed = Date.now() - recordStartedAt;
        updateRecordUi();
        if (elapsed >= MAX_RECORD_MS) {
          try {
            mediaRecorder.stop();
          } catch (err) {
            console.error("autostop failed", err);
            cleanupRecording();
          }
        }
      }, 250);
    }

    function stopRecording() {
      if (!isRecording || !mediaRecorder) return;
      try {
        mediaRecorder.stop();
      } catch (err) {
        console.error("stop recording failed", err);
        cleanupRecording();
      }
    }

    function setSendStatus(text) {
      if (!elSendStatus) return;
      elSendStatus.textContent = text || "";
    }

    function setSendingUi(isSending, labelText) {
      if (isSending) {
        pendingSendUiState = {
          sendDisabled: elSend ? elSend.disabled : true,
          messageDisabled: elMessage ? elMessage.disabled : true,
          attachmentDisabled: elAttachment ? elAttachment.disabled : true,
          sendText: elSend ? elSend.textContent : "Отправить"
        };

        if (elSend) {
          elSend.disabled = true;
          elSend.textContent = pendingFiles.length ? "Загрузка…" : "Отправляю…";
        }
        if (elMessage) elMessage.disabled = true;
        if (elAttachment) elAttachment.disabled = true;
        if (elAttachBtn) elAttachBtn.disabled = true;
        if (elRecordBtn) elRecordBtn.disabled = true;
      } else {
        if (elSend) {
          elSend.disabled = pendingSendUiState ? pendingSendUiState.sendDisabled : false;
          elSend.textContent = pendingSendUiState ? pendingSendUiState.sendText : "Отправить";
        }
        if (elMessage) elMessage.disabled = pendingSendUiState ? pendingSendUiState.messageDisabled : false;
        if (elAttachment) elAttachment.disabled = pendingSendUiState ? pendingSendUiState.attachmentDisabled : false;
        if (elAttachBtn) elAttachBtn.disabled = pendingSendUiState ? pendingSendUiState.attachmentDisabled : false;
        if (elRecordBtn) elRecordBtn.disabled = pendingSendUiState ? pendingSendUiState.attachmentDisabled : false;
        pendingSendUiState = null;
      }

      setSendStatus(labelText);
    }

    function getFilesWord(n) {
      const mod10 = n % 10;
      const mod100 = n % 100;
      if (mod10 === 1 && mod100 !== 11) return "файл";
      if (mod10 >= 2 && mod10 <= 4 && (mod100 < 12 || mod100 > 14)) return "файла";
      return "файлов";
    }

    function renderAttachHint() {
      if (!elAttachHint) return;
      if (!pendingFiles.length) {
        elAttachHint.textContent = "";
        return;
      }

      const names = pendingFiles.map((f) => f.name);
      const visibleNames = names.slice(0, 3).join(", ");
      const restCount = names.length - 3;
      const suffix = restCount > 0 ? ` и ещё ${restCount}` : "";
      const countPart = pendingFilesSelectedTotal > pendingFiles.length
        ? `${pendingFiles.length} ${getFilesWord(pendingFiles.length)} (из ${pendingFilesSelectedTotal})`
        : `${pendingFiles.length} ${getFilesWord(pendingFiles.length)}`;

      elAttachHint.textContent = `Выбрано: ${countPart} — ${visibleNames}${suffix}`;
    }

    function clearPendingFiles() {
      pendingFiles.forEach((file) => revokePreviewUrl(file));
      pendingFiles = [];
      pendingFilesSelectedTotal = 0;
      if (elAttachment) elAttachment.value = "";
      if (elAttachHint) elAttachHint.textContent = "";
      renderPendingAttachments();
    }

    function normalizeMessageText(v) {
      const s = (v ?? "").toString().replace(/\r\n/g, "\n");
      const trimmed = s.trim();
      if (!trimmed) return { ok: false, value: "", reason: "empty" };
      if (trimmed.length > MAX_MESSAGE_LEN) return { ok: false, value: trimmed.slice(0, MAX_MESSAGE_LEN), reason: "too_long" };
      return { ok: true, value: trimmed, reason: null };
    }

    function normalizeContentType(type) {
      const t = String(type || "").toLowerCase();
      const base = t.split(";")[0].trim();
      return base || "application/octet-stream";
    }

    async function uploadAttachments(files, onFileStart) {
      const attachments = [];

      try {
        for (let i = 0; i < files.length; i += 1) {
          const file = files[i];
          if (typeof onFileStart === "function") onFileStart(i);

          const kind = getAttachmentKindFromMime(file.type);
          const isAudio = kind === "audio";
          let contentType = normalizeContentType(file.type);
          const maxBytes = getMaxBytesForKind(kind);

          if ((Number(file.size) || 0) > maxBytes) {
            throw new Error(`Файл \"${file.name || "без имени"}\" превышает лимит ${formatAttachmentSize(maxBytes)}.`);
          }

          if (isAudio && contentType.startsWith("audio/")) {
            const lowerName = String(file.name || "").toLowerCase();
            if (contentType !== "audio/webm" && lowerName.endsWith(".webm")) {
              contentType = "audio/webm";
            }
          }

          const presignResponse = await apiPost("/api/uploads/presign", {
            kind,
            originalName: file.name,
            contentType: file.type ? contentType : ""
          });

          const uploadRes = await fetch(presignResponse.uploadUrl, {
            method: "PUT",
            headers: { "Content-Type": contentType || "application/octet-stream" },
            body: file
          });

          if (!uploadRes.ok) {
            throw new Error("Не удалось загрузить вложение");
          }

          attachments.push({
            key: presignResponse.key,
            type: kind,
            name: file.name || basename(presignResponse.key),
            size: Number(file.size) || 0,
            contentType
          });
        }
      } catch (e) {
        console.error(e);
        alert("Не удалось загрузить вложение");
        throw e;
      }

      return attachments;
    }

    async function sendMessage() {
      if (!socket || !activeChat) return;
      let hasSendError = false;

      try {
        const hasFiles = pendingFiles.length > 0;
        setSendingUi(true, hasFiles ? `Загрузка 0/${pendingFiles.length}…` : "Отправляю…");

        const normalized = normalizeMessageText(elMessage.value);
        if (!normalized.ok) {
          if (normalized.reason === "empty") {
            if (!hasFiles) return;
          }
          if (normalized.reason === "too_long") {
            alert("Слишком длинное сообщение. Максимум 2000 символов.");
            return;
          }
        }

        const text = normalized.reason === "empty" ? "" : normalized.value;

        let attachments = [];
        if (hasFiles) {
          attachments = await uploadAttachments(pendingFiles, (i) => {
            setSendStatus(`Загрузка ${i + 1}/${pendingFiles.length}…`);
          });
        }
        console.log("sent attachments:", attachments.length, attachments);
        const replyToId = pendingReply?.id || null;
        const replyPreview = buildPendingReplyPreview();

        if (activeChat.type === "dm") {
          if (hasFiles) {
            socket.emit("chat:dm", {
              toUserId: Number(activeChat.userId),
              replyToId,
              replyPreview,
              msg: {
                fromUsername: me,
                text,
                attachments
              }
            });
          } else {
            socket.emit("chat:dm", {
              toUserId: Number(activeChat.userId),
              replyToId,
              replyPreview,
              msg: { fromUsername: me, name: me, text, ts: Date.now() }
            });
          }
        } else {
          if (hasFiles) {
            socket.emit("group:msg", {
              groupId: Number(activeChat.groupId),
              replyToId,
              replyPreview,
              msg: {
                fromUsername: me,
                text,
                attachments
              }
            });
          } else {
            socket.emit("group:msg", {
              groupId: Number(activeChat.groupId),
              replyToId,
              replyPreview,
              msg: { fromUsername: me, text, ts: Date.now() }
            });
          }
        }

        resetTypingState();
        setSendStatus("Отправлено");
        setTimeout(() => setSendStatus(""), 700);
        clearPendingFiles();
        elMessage.value = "";
        elMessage.focus();
      } catch (e) {
        hasSendError = true;
        console.error("sendMessage failed", e);
        alert("Не удалось отправить сообщение");
        setSendStatus("Ошибка отправки");
      } finally {
        clearPendingReply();
        setSendingUi(false, "");
        if (hasSendError) {
          setSendStatus("Ошибка отправки");
          setTimeout(() => setSendStatus(""), 1500);
        }
      }
    }

    if (elAttachment) {
      elAttachment.onchange = () => {
        const selected = Array.from(elAttachment.files || []);
        appendPendingFiles(selected, pendingFiles.length + selected.length);
        elAttachment.value = "";
      };
    }

    if (elAttachBtn && elAttachment) {
      elAttachBtn.addEventListener("click", () => {
        if (!elAttachBtn.disabled && !elAttachment.disabled) elAttachment.click();
      });
    }

    if (elRecordBtn) {
      elRecordBtn.addEventListener("click", async () => {
        if (elRecordBtn.disabled) return;
        if (isRecording) {
          stopRecording();
          return;
        }
        await startRecording();
      });
    }

    updateRecordUi();

    if (elReplyCancel) {
      elReplyCancel.addEventListener("click", (e) => {
        e.stopPropagation();
        clearPendingReply();
      });
    }

    elSend.addEventListener("click", sendMessage);

    elMessages.addEventListener("click", async (e) => {
      const replyJumpTarget = e.target.closest("[data-reply-jump]");
      if (replyJumpTarget) {
        e.preventDefault();
        await jumpToReplyMessage(replyJumpTarget);
        return;
      }

      const audioPlayerEl = e.target.closest(".audioPlayer");
      if (audioPlayerEl) {
        const key = audioPlayerEl.dataset.audioKey;
        const messageId = audioPlayerEl.dataset.audioMsgid;
        if (!key || !messageId) return;

        const audioToggleBtn = e.target.closest("[data-audio-toggle]");
        if (audioToggleBtn) {
          e.preventDefault();
          const attachmentType = audioPlayerEl.dataset.audioType || "";
          await toggleAudioPlayback(key, messageId, attachmentType);
          return;
        }

        const audioSeekBar = e.target.closest("[data-audio-seek]");
        if (audioSeekBar) {
          e.preventDefault();
          seekAudioPlayback(key, messageId, { currentTarget: audioSeekBar, clientX: e.clientX });
          return;
        }
      }

      const openBtn = e.target.closest("[data-attach-key]");
      if (!openBtn) return;
      e.preventDefault();

      const key = openBtn.dataset.attachKey;
      const messageId = openBtn.dataset.attachMsgid;
      const type = (openBtn.dataset.attachType || "").toLowerCase();
      const filename = openBtn.dataset.attachFilename || extractOriginalFileName(key);
      const isDownloadButton = openBtn.dataset.attachDownload === "1";
      if (!key || !messageId) return;

      const keys = messageAttachmentKeys.get(messageId) || [];
      const idx = keys.indexOf(key);
      const isImage = !type || type.startsWith("image");

      try {
        if (isDownloadButton) {
          const downloadName = prettyFilenameFromKey(key) || filename;
          await downloadViaApi(key, downloadName);
        } else if (isImage && idx >= 0) {
          openGallery(keys, idx);
        } else {
          await openAttachmentInNewTab(key, filename);
        }
      } catch (err) {
        console.error(err);
        if (isImage && idx >= 0) {
          openGallery(keys, idx);
        } else {
          alert("Не удалось открыть файл");
        }
      }
    });
    elMessage.addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendMessage();
    });
    elMessage.addEventListener("input", handleTypingInput);
    elMessage.addEventListener("blur", () => {
      resetTypingState();
    });

    async function doRegister() {
      try {
        elAuthStatus.textContent = "Регистрирую...";
        const username = elUsername.value.trim();
        const password = elPassword.value;

        const r = await apiPost("/api/register", { username, password });

    async function doLogin() {
      try {
        elAuthStatus.textContent = "Вхожу...";
        const username = elUsername.value.trim();
        const password = elPassword.value;

        const r = await apiPost("/api/login", { username, password });

        me = r.user.username;
        meId = Number(r.user.id);
        token = r.token;

        localStorage.setItem("token", token);
        localStorage.setItem("me", me);
        localStorage.setItem("meId", String(meId));

        elAuthStatus.textContent = `✅ Logged in: ${me}`;

        setAuthUi(true);
        resetUnread();
        connectSocket();

        const groups = await loadGroups().catch(() => []);
        renderGroups(groups);
        const contacts = await loadContacts().catch(() => []);

        const incoming = await loadIncomingRequests().catch(() => []);
        renderIncomingRequests(incoming);
        const outgoing = await loadOutgoingRequests().catch(() => []);
        renderOutgoingRequests(outgoing);
      } catch (e) {
        elAuthStatus.textContent = `❌ ${e.message}`;
      }
    }

    function logout(silent = false) {
      localStorage.removeItem("token");
      localStorage.removeItem("jwt");
      localStorage.removeItem("me");
      localStorage.removeItem("meId");

      token = null;
      me = null;
      meId = null;

      if (!silent) {
        elAuthStatus.textContent = "Вышел";
        elUsername.value = "";
        elPassword.value = "";
      }

      try { if (typeof resetUnread === "function") resetUnread(); } catch(e) {}
      try { if (typeof unreadByKey !== "undefined") unreadByKey.clear(); } catch(e) {}
      updateUnreadTitle();

      try {
        if (window.socket && typeof window.socket.disconnect === "function") window.socket.disconnect();
      } catch(e) {}
      disconnectSocket();

      clearChatUi();
      elGroupsList.innerHTML = "";
      elContactsList.innerHTML = "";
      elIncomingRequestsList.innerHTML = "";
      elOutgoingRequestsList.innerHTML = "";
      activeChat = null;
      syncActiveChatHighlight();
      elChatTitle.textContent = "Выбери группу или пользователя слева";
      setAuthUi(false);

      elUsername.disabled = false;
      elPassword.disabled = false;
      elBtnRegister.disabled = false;
      elBtnLogin.disabled = false;
      elBtnCreateGroup.disabled = true;
      elBtnAddContact.disabled = true;
      elContactUsername.disabled = true;
    }

    elBtnRegister.addEventListener("click", doRegister);
    elBtnLogin.addEventListener("click", doLogin);
    if (elBtnLogout) elBtnLogout.addEventListener("click", logout);
    if (elProfileMenuButton) {
      elProfileMenuButton.addEventListener("click", (event) => {
        event.stopPropagation();
        setProfileMenuOpen(!profileMenuOpen);
      });
    }
    if (elProfileMenuPopup) {
      elProfileMenuPopup.addEventListener("click", (event) => {
        event.stopPropagation();
      });
    }
    if (elProfileChangeAvatar) {
      elProfileChangeAvatar.addEventListener("click", () => {
        setProfileMenuOpen(false);
        if (elProfileAvatarInput) {
          elProfileAvatarInput.value = "";
          elProfileAvatarInput.click();
        }
      });
    }
    if (elProfileLogout) {
      elProfileLogout.addEventListener("click", () => {
        setProfileMenuOpen(false);
        logout();
      });
    }
    if (elProfileAvatarInput) {
      elProfileAvatarInput.addEventListener("change", async (event) => {
        const file = event.target?.files?.[0];
        if (!file) return;
        try {
          await handleProfileAvatarChange(file);
        } catch (e) {
          showToast(e?.message ? `Ошибка: ${e.message}` : "Не удалось обновить аватар");
        } finally {
          elProfileAvatarInput.value = "";
        }
      });
    }
    document.addEventListener("click", (event) => {
      if (!profileMenuOpen || !elProfileMenuPopup || !elProfileMenuButton) return;
      const target = event.target;
      if (elProfileMenuPopup.contains(target) || elProfileMenuButton.contains(target)) return;
      setProfileMenuOpen(false);
    });

    elBtnCreateGroup.addEventListener("click", () => {
      openCreateGroupModal();
    });

    elBtnCancelCreateGroup.addEventListener("click", () => {
      closeCreateGroupModal();
    });

    elCreateGroupModal.addEventListener("click", (event) => {
      if (event.target === elCreateGroupModal) closeCreateGroupModal();
    });

    if (elBtnCancelAddGroupMembers) {
      elBtnCancelAddGroupMembers.addEventListener("click", () => {
        closeAddGroupMembersModal();
      });
    }

    if (elAddGroupMembersModal) {
      elAddGroupMembersModal.addEventListener("click", (event) => {
        if (event.target === elAddGroupMembersModal) closeAddGroupMembersModal();
      });
    }

    if (elAddGroupMembersSearch) {
      elAddGroupMembersSearch.addEventListener("input", (event) => {
        addGroupMembersSearchTerm = String(event.target?.value || "");
        renderAddGroupMembersList();
      });
    }

    if (elBtnConfirmAddGroupMembers) {
      elBtnConfirmAddGroupMembers.addEventListener("click", submitAddGroupMembers);
    }

    document.addEventListener("keydown", (event) => {
      if (event.key !== "Escape") return;
      if (elCreateGroupModal.classList.contains("isOpen")) closeCreateGroupModal();
      if (elAddGroupMembersModal && elAddGroupMembersModal.classList.contains("isOpen")) closeAddGroupMembersModal();
    });

    elBtnConfirmCreateGroup.addEventListener("click", async () => {
      try {
        const groupName = elGroupModalName.value.trim();
        const selectedUsernames = Array.from(selectedParticipants);
        const membersCsv = selectedUsernames.join(",");

        elGroupModalName.classList.remove("errorInput");
        elGroupParticipantsError.textContent = "";

        if (!groupName) {
          elGroupModalName.classList.add("errorInput");
          return;
        }

        if (!selectedUsernames.length) {
          elGroupParticipantsError.textContent = "Выберите хотя бы одного участника";
          return;
        }

        const membersUsernames = membersCsv
          .split(",")
          .map((x) => x.trim())
          .filter(Boolean);

        await createGroup(groupName, membersUsernames);
        closeCreateGroupModal();
      } catch (e) {
        alert("Ошибка создания группы: " + e.message);
      }
    });

    elBtnDeleteGroup.addEventListener("click", deleteActiveGroup);
    if (elBtnAddGroupMember) elBtnAddGroupMember.addEventListener("click", addMembersToActiveGroup);
    elBtnLeaveGroup.addEventListener("click", leaveActiveGroup);
    if (elBtnRemoveContact) elBtnRemoveContact.addEventListener("click", removeActiveContact);
    if (elBtnGroupMembers) elBtnGroupMembers.addEventListener("click", openGroupMembersModal);
    if (elBtnCloseGroupMembers) elBtnCloseGroupMembers.addEventListener("click", closeGroupMembersModal);
    if (elGroupMembersModal) {
      elGroupMembersModal.addEventListener("click", (event) => {
        if (event.target === elGroupMembersModal) closeGroupMembersModal();
      });
    }

    elBtnAddContact.addEventListener("click", async () => {
      try {
        const username = elContactUsername.value.trim();
        if (!username) return;

        await apiPost("/api/contacts/request", { username });
        elContactUsername.value = "";
        alert("Заявка отправлена");

        const outgoing = await loadOutgoingRequests().catch(() => []);
        renderOutgoingRequests(outgoing);
      } catch (e) {
        alert("Ошибка отправки заявки: " + e.message);
      }
    });

    (async function restoreSession() {
      const t = localStorage.getItem("token");
      const savedMe = localStorage.getItem("me");
      const savedMeId = localStorage.getItem("meId");

      if (!t || !savedMe || !savedMeId) {
        setAuthUi(false);
        return;
      }

      token = t;
      me = savedMe;
      meId = Number(savedMeId);

      try {
        await loadUsersDirectory();
        elAuthStatus.textContent = `✅ Logged in: ${me} (restore)`;
        setAuthUi(true);
        resetUnread();
        connectSocket();

        const groups = await loadGroups().catch(() => []);
        renderGroups(groups);
        const contacts = await loadContacts().catch(() => []);
        contactsCache = contacts;
        renderContacts(contactsCache);
        const incoming = await loadIncomingRequests().catch(() => []);
        renderIncomingRequests(incoming);
        const outgoing = await loadOutgoingRequests().catch(() => []);
        renderOutgoingRequests(outgoing);
      } catch (e) {
        console.log("restoreSession failed:", e.message);
        elAuthStatus.textContent = "Сессия истекла. Войди заново.";
        logout(true);
      }
    })();
  </script>
</body>
</html>
