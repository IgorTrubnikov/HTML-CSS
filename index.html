<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My Chat</title>
  <style>
    :root {
      --bg0: #f5f7ff;
      --bg1: #eaf0ff;
      --card: rgba(255,255,255,.72);
      --card2: rgba(255,255,255,.55);
      --text: #101828;
      --muted: rgba(16,24,40,.55);
      --border: rgba(16,24,40,.10);
      --shadow: 0 24px 70px rgba(15, 23, 42, .12);
      --shadow2: 0 10px 30px rgba(15, 23, 42, .10);
      --accent: #2f6bff;
      --accent2: #74a7ff;
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
    }
    html[data-theme="dark"] {
      --bg0: #060A14;
      --bg1: #0B1226;
      --card: rgba(18, 23, 35, .70);
      --card2: rgba(18, 23, 35, .52);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.56);
      --border: rgba(255,255,255,.10);
      --shadow: 0 28px 80px rgba(0,0,0,.55);
      --shadow2: 0 10px 30px rgba(0,0,0,.45);
      --accent: #2f6bff;
      --accent2: #6ea8ff;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:
        radial-gradient(1200px 700px at 15% 15%, color-mix(in srgb, var(--accent) 35%, transparent), transparent 60%),
        radial-gradient(1000px 600px at 80% 25%, color-mix(in srgb, var(--accent2) 35%, transparent), transparent 65%),
        radial-gradient(800px 500px at 50% 90%, color-mix(in srgb, var(--accent2) 25%, transparent), transparent 70%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      color:var(--text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    body::before {
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      opacity:.28;
      background:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,.35) 0 2px, transparent 3px),
        radial-gradient(circle at 70% 45%, rgba(255,255,255,.25) 0 1.5px, transparent 3px),
        radial-gradient(circle at 40% 80%, rgba(255,255,255,.20) 0 2px, transparent 4px);
      filter: blur(.2px);
      mix-blend-mode: overlay;
    }
    html[data-theme="dark"] body::before { opacity:.1; }
    .wrap { max-width: 1400px; width: 100%; margin: 0 auto; padding: 20px; min-height: 100vh; height: 100vh; box-sizing: border-box; display:flex; flex-direction:column; gap:18px; position:relative; z-index:1; }
    .hint { font-size: 12px; color:var(--muted); padding:0 2px; }
    .card {
      background: var(--card);
      background-image: linear-gradient(145deg, color-mix(in srgb, var(--card) 90%, #fff 10%), color-mix(in srgb, var(--card2) 90%, transparent));
      border: 1px solid color-mix(in srgb, var(--border) 65%, #fff 35%);
      border-radius: var(--radius-xl);
      overflow: hidden;
      box-shadow:
        var(--shadow),
        inset 0 1px 0 color-mix(in srgb, #fff 45%, transparent);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
    }
    input { border:1px solid var(--border); border-radius:14px; height:44px; padding:0 14px; font-size:14px; outline:none; background: var(--card2); color:var(--text); transition:.2s ease; }
    input:focus { box-shadow:0 0 0 4px rgba(47,107,255,.18); border-color: transparent; }
    button { height:40px; border-radius:999px; padding:0 16px; border:1px solid var(--border); background: var(--card2); color:var(--text); font-weight:600; cursor:pointer; transition:.2s ease; }
    button:hover { transform: translateY(-1px); box-shadow: 0 8px 18px rgba(15, 23, 42, 0.12); }
    button:active { transform: translateY(0); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-primary,
    .btn-primary-glass,
    #btnLogin,
    #send {
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      padding:8px 16px;
      border-radius:20px;
      font-weight:500;
      border:none;
      cursor:pointer;
      background: linear-gradient(135deg, #4f8cff, #2f5bff);
      color:white;
      box-shadow: 0 4px 18px rgba(79,140,255,0.35);
      transition: all 0.2s ease;
    }
    .btn-primary:hover,
    .btn-primary-glass:hover,
    #btnLogin:hover,
    #send:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 22px rgba(79,140,255,0.45);
    }
    .btn-danger,
    .btn-danger-glass,
    button.btn-primary.btn-danger {
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      padding:8px 16px;
      border-radius:20px;
      font-weight:500;
      border:none;
      cursor:pointer;
      background: linear-gradient(135deg, #ff5a6b, #ff2f5b);
      color:white;
      box-shadow: 0 4px 18px rgba(255,90,107,0.35);
      transition: all 0.2s ease;
    }
    .btn-danger:hover,
    .btn-danger-glass:hover,
    button.btn-primary.btn-danger:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 22px rgba(255,90,107,0.45);
    }

    .btn-primary,
    #btnLogin,
    #send {
      background: linear-gradient(180deg, #6fa2ff, #3c6dff);
      color:#fff;
      border:0;
      box-shadow: 0 12px 30px rgba(60,110,255,.35);
      transition: all .2s ease;
    }
    .btn-primary:hover,
    #btnLogin:hover,
    #send:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 40px rgba(60,110,255,.45);
    }
    .btnGhost { background: rgba(255,255,255,.35); }
    .btnSecondary {
      height: auto;
      padding: 8px 12px;
      border-radius: 12px;
      margin: 8px auto 10px;
      display: block;
      background: color-mix(in srgb, var(--card2) 88%, transparent);
      border: 1px solid color-mix(in srgb, var(--border) 80%, #fff 20%);
      box-shadow: 0 8px 20px rgba(15, 23, 42, .10);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .sideFooter {
      flex: 0 0 auto;
      margin-top: auto;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }
    .ghostBtn {
      width: 100%;
      height: 40px;
      border-radius: 999px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .ghostBtn:hover {
      background: color-mix(in srgb, var(--card2) 65%, transparent);
      transform: translateY(-1px);
    }
    html[data-theme="dark"] .ghostBtn:hover {
      background: color-mix(in srgb, var(--card2) 85%, #fff 15%);
    }
    .iconBtn {
      width: 38px;
      min-width: 38px;
      height: 38px;
      padding: 0;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .btnMini { height:40px; padding:0 12px; border-radius:999px; font-size:13px; }
    .groupAddBtn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      line-height: 1;
      padding: 0 14px;
      font-size: 13px;
    }
    .groupAddBtn .icon,
    .groupAddBtn .label {
      font-size: 13px;
      line-height: 1;
    }
    .groupLeaveBtn {
      height: 34px;
      padding: 0 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid color-mix(in srgb, var(--border) 80%, #fff 20%);
      background: color-mix(in srgb, var(--card2) 86%, transparent);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: none;
      align-items: center;
      gap: 4px;
      box-shadow: none;
    }
    .groupLeaveBtn:hover {
      background: color-mix(in srgb, var(--card2) 70%, rgba(47,107,255,.2));
      border-color: color-mix(in srgb, var(--accent) 45%, var(--border));
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.12);
    }
    .contactRemoveBtn {
      height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid rgba(255,90,107,.35);
      background: linear-gradient(135deg, rgba(255,90,107,.95), rgba(255,47,91,.95));
      color: #fff;
      display: none;
      align-items: center;
      box-shadow: 0 6px 16px rgba(255,90,107,.28);
    }
    .contactRemoveBtn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(255,90,107,.34);
      filter: brightness(1.03);
    }
    .groupMembersBtn {
      height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid color-mix(in srgb, var(--border) 80%, #fff 20%);
      background: color-mix(in srgb, var(--card2) 86%, transparent);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: none;
      align-items: center;
      box-shadow: none;
    }
    .groupMembersBtn:hover {
      background: color-mix(in srgb, var(--card2) 70%, rgba(47,107,255,.2));
      border-color: color-mix(in srgb, var(--accent) 45%, var(--border));
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.12);
    }
    .layout { flex:1; display:grid; grid-template-columns: 320px 1fr; gap: 18px; min-height: 0; height: 100%; align-items:stretch; }
    .sidebar { display:flex; flex-direction:column; min-height:0; height:100%; box-sizing:border-box; overflow:hidden; overflow-x:hidden; }
    .addUserRow {
      display: flex;
      gap: 10px;
      align-items: center;
      width: 100%;
      min-width: 0;
    }
    .addUserRow input {
      flex: 1;
      min-width: 0;
      width: auto;
      box-sizing: border-box;
    }
    .iconAction {
      width: 40px;
      height: 40px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
      line-height: 1;
      color: white;
      background: linear-gradient(180deg, var(--accent2), var(--accent));
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: 0 10px 24px rgba(60,110,255,.30);
      flex: 0 0 auto;
      cursor: pointer;
      transition: transform .18s ease, box-shadow .18s ease, filter .18s ease;
      padding: 0;
    }
    .iconAction:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 32px rgba(60,110,255,.42);
      filter: brightness(1.02);
    }
    .iconAction:active {
      transform: translateY(0px) scale(.98);
    }
    .users { width: 320px; min-width: 280px; padding: 0; overflow: hidden; min-height: 0; height:100%; display: flex; flex-direction: column; gap: 0; border-radius: 20px; backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); }
    .usersScroll { flex: 1; min-height: 0; overflow: auto; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
    .sidebarFooter {
      flex: 0 0 auto;
      padding: 12px;
      padding-bottom: 16px;
      border-top: 1px solid color-mix(in srgb, var(--border) 80%, transparent);
    }
    html[data-theme="dark"] .sidebarFooter { border-top: 1px solid rgba(255,255,255,0.08); }
    .sidebarFooter button { width: 100%; border-radius: 999px; }
    .sidebarFooter #btnLogout {
      width: 100%;
      border-radius: 999px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      text-align: center;
      text-indent: 0;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.14);
      color: rgba(255,255,255,0.92);
      box-shadow: 0 8px 24px rgba(0,0,0,0.18);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .sidebarFooter #btnLogout::before,
    .sidebarFooter #btnLogout::after {
      content: none !important;
    }
    .sidebarFooter #btnLogout > * {
      margin: 0 !important;
      padding: 0 !important;
    }
    .sidebarFooter #btnLogout:hover {
      background: rgba(255,255,255,0.09);
      border-color: rgba(255,255,255,0.18);
    }
    .sidebarFooter #btnLogout:active { transform: scale(0.99); }
    .blockTitle { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:6px; }
    .sectionTitle {
      position: relative;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: .3px;
      color: var(--text);
      padding-left: 10px;
      line-height: 1.35;
      margin: 18px 0 8px 0;
    }
    html[data-theme="dark"] .sectionTitle { color: rgba(255,255,255,.92); }
    .sectionTitle::before {
      content: "";
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 16px;
      border-radius: 2px;
      background: color-mix(in srgb, var(--accent) 80%, var(--accent2) 20%);
    }
    .sidebar-empty {
      font-size: 13px;
      line-height: 1.45;
      margin-top: 4px;
      color: var(--muted);
    }
    html[data-theme="dark"] .sidebar-empty {
      color: color-mix(in srgb, var(--muted) 72%, #fff 28%);
    }
    .user { display:flex; align-items:center; gap:8px; padding:11px 12px; border-radius:14px; cursor:pointer; border:1px solid transparent; background:transparent; }
    .user:hover { background:rgba(47,107,255,.08); }
    .user.active { background:rgba(47,107,255,.13); border-color:var(--border); }
    .sideStatus { font-size: 12px; color:var(--muted); }
    .userInfo {
      min-width: 0;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .userAvatar {
      width: 30px;
      min-width: 30px;
      height: 30px;
      border-radius: 999px;
      overflow: hidden;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: color-mix(in srgb, var(--accent) 18%, var(--card2));
      border: 1px solid color-mix(in srgb, var(--accent) 35%, var(--border));
      color: color-mix(in srgb, var(--text) 86%, #fff 14%);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .2px;
      user-select: none;
    }
    .userAvatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      border-radius: 999px;
    }
    .badge {
      min-width: 18px;
      height: 18px;
      padding: 0 6px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: white;
      background: linear-gradient(180deg, var(--accent2), var(--accent));
      box-shadow: 0 8px 18px rgba(60,110,255,.35);
      margin-left: auto;
    }
    .chat { display:flex; flex-direction:column; min-height:0; height: calc(100vh - 60px); border-radius: 24px; }
    .chatTop { padding: 22px 28px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border); }
    .chatTitle { font-weight:700; }
    .profileMenuWrap { position: relative; display: inline-flex; }
    .profileBtn {
      width: 32px;
      min-width: 32px;
      height: 32px;
      border-radius: 999px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .2px;
      cursor: pointer;
      background: color-mix(in srgb, var(--accent) 15%, var(--card2));
      border: 1px solid color-mix(in srgb, var(--accent) 35%, var(--border));
      color: color-mix(in srgb, var(--text) 86%, #fff 14%);
    }
    .profileBtn img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 999px;
      display: block;
    }
    .profilePopup {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      min-width: 160px;
      padding: 6px;
      border-radius: 9px;
      border: 1px solid color-mix(in srgb, var(--border) 80%, #fff 20%);
      background: #fff;
      box-shadow: 0 10px 26px rgba(15, 23, 42, .18);
      z-index: 40;
    }
    html[data-theme="dark"] .profilePopup {
      background: color-mix(in srgb, var(--card) 94%, #1f2937 6%);
      box-shadow: 0 10px 26px rgba(0, 0, 0, .45);
    }
    .profilePopup.hidden { display: none; }
    .profilePopupAction {
      width: 100%;
      height: 34px;
      border: 0;
      border-radius: 7px;
      background: transparent;
      color: var(--text);
      justify-content: flex-start;
      font-size: 13px;
      font-weight: 500;
      padding: 0 10px;
      cursor: pointer;
      box-shadow: none;
    }
    .profilePopupAction:hover {
      transform: none;
      box-shadow: none;
      background: color-mix(in srgb, var(--card2) 75%, rgba(47,107,255,.12));
    }
    .messages { flex:1; padding:20px 28px; overflow:auto; display:flex; flex-direction:column; gap:10px; min-height:0; align-items:flex-start; }
    .msg { position:relative; display:inline-block; padding:13px 78px 13px 16px; border-radius:var(--radius-md); max-width:70%; width:fit-content; word-break: break-word; border:1px solid var(--border); background:rgba(255,255,255,.45); }
    .msg.me { align-self:flex-end; margin-left:0; background:rgba(47,107,255,.12); border-color:rgba(47,107,255,.25); }
    .meta { font-size:12px; color:var(--muted); display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
    .text { font-size:14px; line-height:1.35; white-space:pre-wrap; }
    .composer { display:flex; gap:10px; padding:20px 28px; align-items:center; border-top:1px solid var(--border); }
    .composer input { flex:1; height:48px; box-shadow: 0 8px 22px rgba(15, 23, 42, 0.08); }
    .hidden { display: none !important; }
    .pendingAtt {
      display: flex;
      gap: 8px;
      padding: 8px 10px;
      margin: 8px 28px 0;
      flex-wrap: wrap;
      border-radius: 14px;
      background: color-mix(in srgb, var(--card2) 82%, rgba(47,107,255,.12));
      border: 1px solid color-mix(in srgb, var(--accent) 24%, var(--border));
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .pendingAttItem {
      width: 56px;
      height: 56px;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
      background: color-mix(in srgb, var(--card2) 88%, rgba(255,255,255,.12));
      border: 1px solid color-mix(in srgb, var(--accent) 22%, var(--border));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: var(--text);
      transition: border-color .2s ease, box-shadow .2s ease, transform .2s ease;
    }
    .pendingAttItem:hover {
      transform: translateY(-1px);
      border-color: color-mix(in srgb, var(--accent) 45%, var(--border));
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.16);
    }
    .pendingAttItem img {
      object-fit: cover;
      width: 100%;
      height: 100%;
      display: block;
    }
    .pendingAttMeta {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      line-height: 1.1;
      text-align: center;
      padding: 4px;
    }
    .pendingAttIcon { font-size: 16px; }
    .pendingAttExt {
      max-width: 48px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 10px;
      color: var(--muted);
    }
    .pendingAttDelete {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 0;
      background: rgba(15, 23, 42, .62);
      color: white;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      font-size: 13px;
      line-height: 1;
      z-index: 1;
    }
    .pendingAttDelete:hover {
      background: rgba(15, 23, 42, .82);
      transform: none;
      box-shadow: none;
    }
    .attachBtn {
      width: 38px;
      min-width: 38px;
      height: 38px;
      border-radius: 999px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      border: 1px solid color-mix(in srgb, var(--accent) 38%, var(--border));
      background: color-mix(in srgb, var(--card2) 78%, rgba(47,107,255,.2));
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.14), inset 0 1px 0 rgba(255,255,255,.45);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: transform .18s ease, box-shadow .18s ease, background-color .18s ease, border-color .18s ease;
      flex-shrink: 0;
    }
    .attachBtn:hover {
      transform: translateY(-1px);
      background: color-mix(in srgb, var(--card2) 62%, rgba(47,107,255,.34));
      border-color: color-mix(in srgb, var(--accent) 58%, var(--border));
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.2), inset 0 1px 0 rgba(255,255,255,.5);
    }
    .attachBtn:active {
      transform: translateY(0) scale(.97);
      background: color-mix(in srgb, var(--card2) 70%, rgba(47,107,255,.28));
    }
    .attachBtn:disabled { opacity: .58; box-shadow: none; transform: none; }
    .recordBtn {
      gap: 4px;
      width: auto;
      min-width: 38px;
      padding: 0 10px;
      font-size: 13px;
    }
    .recordBtnDot {
      width: 8px;
      height: 8px;

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const THEME_KEY = "yasya_theme";
    const savedTheme = localStorage.getItem(THEME_KEY);
    const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
    const initialTheme = savedTheme || (prefersDark ? "dark" : "light");
    document.documentElement.setAttribute("data-theme", initialTheme);

    function setTheme(next) {
      document.documentElement.setAttribute("data-theme", next);
      localStorage.setItem(THEME_KEY, next);
      const btn = document.getElementById("themeToggle");
      if (btn) btn.textContent = next === "dark" ? "☀︎" : "☾";
    }

    const elApp = document.getElementById("app");
    const elMessages = document.getElementById("messages");
    const elLoadMoreBtn = document.getElementById("loadMoreBtn");
    const INFINITE_SCROLL_ENABLED = true;
    function isNearBottom(el, thresholdPx = 80) {
      return el.scrollHeight - el.scrollTop - el.clientHeight < thresholdPx;
    }

    function shouldLoadMoreOnScroll(scroller) {
      return scroller.scrollTop < 80;
    }

    function scrollToBottom() {
      elMessages.scrollTop = elMessages.scrollHeight;
    }

    const elGroupsList = document.getElementById("groupsList");
    const elContactsList = document.getElementById("contactsList");
    const elIncomingRequestsList = document.getElementById("incomingRequestsList");
    const elOutgoingRequestsList = document.getElementById("outgoingRequestsList");
    const elMessage = document.getElementById("message");
    const elAttachment = document.getElementById("attachment");
    const elAttachBtn = document.getElementById("attachBtn");
    const elRecordBtn = document.getElementById("recordBtn");
    const elRecordTimer = document.getElementById("recordTimer");
    const elAttachHint = document.getElementById("attachHint");
    const elPendingAttachments = document.getElementById("pendingAttachments");
    const elSendStatus = document.getElementById("sendStatus");
    const elSend = document.getElementById("send");
    const elChatTitle = document.getElementById("chatTitle");
    const elReplyBar = document.getElementById("replyBar");
    const elReplyBarText = document.getElementById("replyBarText");
    const elReplyCancel = document.getElementById("replyCancel");
    const elTypingHint = document.getElementById("typingHint");
    const elGroupTypingHint = document.getElementById("groupTypingHint");

    const elUsername = document.getElementById("username");
    const elPassword = document.getElementById("password");
    const elBtnRegister = document.getElementById("btnRegister");
    const elBtnLogin = document.getElementById("btnLogin");
    const elBtnLogout = document.getElementById("btnLogout");
    const elAuthStatus = document.getElementById("authStatus");
    const elAuthScreen = document.getElementById("authScreen");
    const elAuthPanel = document.getElementById("authPanel");
    const elBtnCreateGroup = document.getElementById("btnCreateGroup");
    const elBtnAddGroupMember = document.getElementById("btnAddGroupMember");
    const elBtnDeleteGroup = document.getElementById("btnDeleteGroup");
    const elBtnLeaveGroup = document.getElementById("btnLeaveGroup");
    const elBtnGroupMembers = document.getElementById("btnGroupMembers");
    const elBtnRemoveContact = document.getElementById("btnRemoveContact");
    const elContactUsername = document.getElementById("contactUsername");
    const elBtnAddContact = document.getElementById("btnAddContact");
    const elThemeToggle = document.getElementById("themeToggle");
    const elProfileMenuButton = document.getElementById("profileMenuButton");
    const elProfileMenuPopup = document.getElementById("profileMenuPopup");
    const elProfileChangeAvatar = document.getElementById("profileChangeAvatar");
    const elProfileLogout = document.getElementById("profileLogout");
    const elProfileAvatarInput = document.getElementById("profileAvatarInput");
    const elCreateGroupModal = document.getElementById("createGroupModal");
    const elGroupModalName = document.getElementById("groupModalName");
    const elGroupSelectedChips = document.getElementById("groupSelectedChips");
    const elGroupParticipantsError = document.getElementById("groupParticipantsError");
    const elGroupContactsList = document.getElementById("groupContactsList");
    const elBtnCancelCreateGroup = document.getElementById("btnCancelCreateGroup");
    const elBtnConfirmCreateGroup = document.getElementById("btnConfirmCreateGroup");
    const elAddGroupMembersModal = document.getElementById("addGroupMembersModal");
    const elAddGroupMembersSearch = document.getElementById("addGroupMembersSearch");
    const elAddGroupMembersList = document.getElementById("addGroupMembersList");
    const elBtnCancelAddGroupMembers = document.getElementById("btnCancelAddGroupMembers");
    const elBtnConfirmAddGroupMembers = document.getElementById("btnConfirmAddGroupMembers");
    const elGroupMembersModal = document.getElementById("groupMembersModal");
    const elGroupMembersList = document.getElementById("groupMembersList");
    const elBtnCloseGroupMembers = document.getElementById("btnCloseGroupMembers");

    setTheme(initialTheme);
    if (elThemeToggle) {
      elThemeToggle.addEventListener("click", () => {
        const current = document.documentElement.getAttribute("data-theme") || "light";
        setTheme(current === "dark" ? "light" : "dark");
      });
    }
    if (elLoadMoreBtn) {
      elLoadMoreBtn.addEventListener("click", loadOlderHistory);
    }
    if (elMessages) {
      elMessages.addEventListener("scroll", onMessagesScroll, { passive: true });
    }

    let socket = null;
    let me = null;
    let meId = null;
    let token = null;
    const BASE_TITLE = document.title || "Yasya.online";
    let unreadCount = 0;

    function updateTitle() {
      document.title = unreadCount > 0 ? `(${unreadCount}) ${BASE_TITLE}` : BASE_TITLE;
    }

    const unreadByKey = new Map();

    function keyForPeer(userId) { return `p:${Number(userId)}`; }
    function keyForGroup(groupId) { return `g:${Number(groupId)}`; }
    function getActiveKey() {
      if (!activeChat) return null;
      if (activeChat.type === "dm") return keyForPeer(activeChat.userId);
      if (activeChat.type === "group") return keyForGroup(activeChat.groupId);
      return null;
    }

    function syncActiveChatHighlight() {
      const key = getActiveKey();
      document.querySelectorAll(".user[data-chat-key]").forEach((el) => {
        const isActive = !!key && el.dataset.chatKey === key;
        el.classList.toggle("active", isActive);
      });
    }

    function sumUnread() {
      let total = 0;
      unreadByKey.forEach((count) => { total += Number(count) || 0; });
      return total;
    }

    function renderUnreadBadge(el, count) {
      if (!el) return;
      let badge = el.querySelector(".badge");
      if (!badge) {
        badge = document.createElement("span");
        badge.className = "badge";
        badge.style.display = "none";
        el.appendChild(badge);
      }
      if (count > 0) {
        badge.textContent = count > 99 ? "99+" : String(count);
        badge.style.display = "inline-flex";
      } else {
        badge.textContent = "";
        badge.style.display = "none";
      }
    }

    function renderUnreadBadges() {
      document.querySelectorAll(".user[data-chat-key]").forEach((el) => {
        const key = el.dataset.chatKey;
        renderUnreadBadge(el, unreadByKey.get(key) || 0);
      });
    }

    function updateUnreadTitle() {
      unreadCount = sumUnread();
      updateTitle();
    }

    function incUnread(key) {
      if (!key) return;
      unreadByKey.set(key, (unreadByKey.get(key) || 0) + 1);
      renderUnreadBadges();
      updateUnreadTitle();
    }

    function resetUnreadKey(key) {
      if (!key) return;
      unreadByKey.delete(key);
      renderUnreadBadges();
      updateUnreadTitle();
    }

    function resetUnread() {
      resetUnreadKey(getActiveKey());
    }

    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) resetUnread();
    });
    window.addEventListener("focus", resetUnread);

    // activeChat:
    // { type:"dm", userId, username, socketId }
    // { type:"group", groupId, title, createdBy }
    let activeChat = null;

    const dmHistory = {};
    const groupHistory = {};
    const dmMsgDomById = new Map();
    const messageAttachmentKeys = new Map();
    let gallery = { isOpen:false, keys:[], index:0, cache:new Map() };
    let usersStatusCache = new Map();
    let contactsCache = [];
    let groupsCache = [];
    let jumpHighlightTimer = null;
    const selectedParticipants = new Set();
    const selectedGroupMembersToAdd = new Set();
    let addGroupMembersSearchTerm = "";
    let activeMsgMenu = null;
    let pendingReply = null; // { id, fromUsername, text }
    let typingPeers = new Map(); // fromUserId -> timeoutId
    let typingActivePeerUserId = null;
    let typingStopTimer = null;
    let isTyping = false;
    let groupTyping = new Map(); // key `${groupId}:${fromUserId}` -> timeoutId
    let groupTypingActiveUserId = null;
    let groupTypingStopTimer = null;
    let isGroupTyping = false;
    const REACTION_EMOJIS = ["👍", "❤️", "😂", "😮", "😢", "👎"];
    let reactionPopoverEl = null;
    let activeReactionPopover = null;
    let toastTimer = null;
    const audioPlayer = new Audio();
    const audioUrlCache = new Map();
    const usersById = new Map();
    const avatarKeyByUserId = new Map();
    const avatarUrlCache = new Map();
    let playingAudioKey = null;
    let playingAudioMsgId = null;
    let audioPlayToken = 0;
    let audioIsStarting = false;
    let currentAudioKey = null;
    const groupMembersCache = {};
    const groupMembersLoading = new Set();
    let profileMenuOpen = false;

    let currentChatType = null; // "dm" | "group"
    let currentPeerUserId = null;
    let currentGroupId = null;

    let dmBeforeId = null;
    let dmHasMore = false;

    let groupBeforeId = null;
    let groupHasMore = false;

    const HISTORY_PAGE_SIZE = 50;
    let isLoadingMore = false;

    let galleryOverlay = null;
    let galleryImage = null;
    let galleryStatus = null;
    let galleryPrev = null;
    let galleryNext = null;
    let galleryCounter = null;

    function truncateReplyText(text, maxLen = 80) {
      const raw = typeof text === "string" ? text.replace(/\s+/g, " ").trim() : "";
      if (!raw) return "";
      return raw.length > maxLen ? `${raw.slice(0, maxLen)}…` : raw;
    }

    function renderReplyBar() {
      if (!elReplyBar || !elReplyBarText) return;
      if (!pendingReply || !pendingReply.id) {
        elReplyBar.style.display = "none";
        elReplyBarText.textContent = "";
        return;
      }
      const shortText = truncateReplyText(pendingReply.text || "", 80) || "(без текста)";
      elReplyBarText.textContent = `Ответ на: ${pendingReply.fromUsername || "unknown"}: ${shortText}`;
      elReplyBar.style.display = "flex";
    }

    function clearPendingReply() {
      pendingReply = null;
      renderReplyBar();
    }

    function resolveDmUsername(userId) {
      const contact = getContactById(userId);
      return contact?.username || (activeChat?.type === "dm" && Number(activeChat.userId) === Number(userId) ? activeChat.username : "");
    }

    function hideTypingHint() {
      if (!elTypingHint) return;
      elTypingHint.style.display = "none";
      elTypingHint.textContent = "";
      typingActivePeerUserId = null;
    }

    function showTypingHint(fromUserId) {
      if (!elTypingHint) return;
      const username = resolveDmUsername(fromUserId);
      elTypingHint.textContent = username ? `${username} печатает…` : "Печатает…";
      elTypingHint.style.display = "block";
      typingActivePeerUserId = Number(fromUserId);
    }

    function hideGroupTypingHint() {
      if (!elGroupTypingHint) return;
      elGroupTypingHint.style.display = "none";
      elGroupTypingHint.textContent = "";
      groupTypingActiveUserId = null;
    }

    function showGroupTypingHint(fromUserId, fromUsername) {
      if (!elGroupTypingHint) return;
      elGroupTypingHint.textContent = `${fromUsername || "Кто-то"} печатает…`;
      elGroupTypingHint.style.display = "block";
      groupTypingActiveUserId = Number(fromUserId);
    }

    function clearTypingPeerTimeout(fromUserId) {
      const uid = Number(fromUserId);
      const timeoutId = typingPeers.get(uid);
      if (timeoutId) {
        clearTimeout(timeoutId);
      }
      typingPeers.delete(uid);
    }

    function clearGroupTypingTimeout(groupId, fromUserId) {
      const gid = Number(groupId);
      const uid = Number(fromUserId);
      if (!gid || !uid) return;
      const key = `${gid}:${uid}`;
      const timeoutId = groupTyping.get(key);
      if (timeoutId) clearTimeout(timeoutId);
      groupTyping.delete(key);
    }

    function emitTypingStop() {
      if (!socket || !isTyping || activeChat?.type !== "dm" || !activeChat.userId) return;
      socket.emit("typing:stop", { peerUserId: Number(activeChat.userId) });
      isTyping = false;
      if (typingStopTimer) {
        clearTimeout(typingStopTimer);
        typingStopTimer = null;
      }
    }

    function emitGroupTypingStop() {
      if (!socket || !isGroupTyping || activeChat?.type !== "group" || !activeChat.groupId) return;
      socket.emit("group:typing:stop", { groupId: Number(activeChat.groupId) });
      isGroupTyping = false;
      if (groupTypingStopTimer) {
        clearTimeout(groupTypingStopTimer);
        groupTypingStopTimer = null;
      }
    }

    function resetTypingState() {
      if (typingStopTimer) {
        clearTimeout(typingStopTimer);
        typingStopTimer = null;
      }
      if (groupTypingStopTimer) {
        clearTimeout(groupTypingStopTimer);
        groupTypingStopTimer = null;
      }
      emitTypingStop();
      emitGroupTypingStop();
    }

    function handleTypingInput() {
      if (!socket) return;

      if (activeChat?.type === "dm" && activeChat.userId) {
        if (!isTyping) {
          socket.emit("typing:start", { peerUserId: Number(activeChat.userId) });
          isTyping = true;
        }

        if (typingStopTimer) clearTimeout(typingStopTimer);
        typingStopTimer = setTimeout(() => {
          resetTypingState();
        }, 800);
        return;
      }

      if (activeChat?.type === "group" && activeChat.groupId) {
        if (!isGroupTyping) {
          socket.emit("group:typing:start", { groupId: Number(activeChat.groupId) });
          isGroupTyping = true;
        }

        if (groupTypingStopTimer) clearTimeout(groupTypingStopTimer);
        groupTypingStopTimer = setTimeout(() => {
          emitGroupTypingStop();
        }, 800);
      }
    }

    function buildPendingReplyPreview() {
      if (!pendingReply?.id) return null;
      return {
        id: pendingReply.id,
        from_username: pendingReply.fromUsername || "unknown",
        text: truncateReplyText(pendingReply.text || "", 80),
      };
    }

    function setPendingReplyFromMessage(message) {
      if (!message) return;
      pendingReply = {
        id: message.id,
        fromUsername: message.fromUsername || message.from_username || message.name || "unknown",
        text: message.text || "",
      };
      renderReplyBar();
      if (elMessage) elMessage.focus();
    }

    function buildReplyPreview(message, context = {}) {
      const hasReplyId = message?.reply_to_message_id != null;
      if (!hasReplyId) return null;

      const reply = document.createElement("div");
      reply.className = "msgReplyPreview";
      reply.dataset.replyJump = String(message.reply_to_message_id);
      if (context.chatKind) reply.dataset.chatKind = context.chatKind;
      if (context.peerId != null) reply.dataset.peerId = String(context.peerId);
      if (context.groupId != null) reply.dataset.groupId = String(context.groupId);

      if (message.reply_to) {
        const from = message.reply_to.from_username || message.reply_to.fromUsername || "unknown";
        const text = truncateReplyText(message.reply_to.text || "", 80);
        reply.textContent = `↩ ${from}: ${text || "(без текста)"}`;
      } else {
        reply.textContent = "↩ Сообщение недоступно";
      }
      return reply;
    }

    function ensureGalleryOverlay() {
      if (galleryOverlay) return;
      galleryOverlay = document.createElement("div");
      galleryOverlay.id = "galleryOverlay";

      galleryOverlay.innerHTML = `

          <div class="viewerToolbar" style="height:52px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;border-bottom:1px solid rgba(255,255,255,.08);">
            <div style="display:flex;align-items:center;gap:8px;">
              <button type="button" aria-label="Предыдущее изображение" data-gallery-prev style="width:40px;min-width:40px;height:40px;border-radius:999px;padding:0;display:inline-flex;align-items:center;justify-content:center;background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.16);font-size:20px;">←</button>
              <button type="button" aria-label="Следующее изображение" data-gallery-next style="width:40px;min-width:40px;height:40px;border-radius:999px;padding:0;display:inline-flex;align-items:center;justify-content:center;background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.16);font-size:20px;">→</button>

            <button type="button" aria-label="Закрыть" data-gallery-close style="width:40px;min-width:40px;height:40px;border-radius:999px;padding:0;display:inline-flex;align-items:center;justify-content:center;background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.16);font-size:22px;line-height:1;">✕</button>

          </div>
        </div>`;
      document.body.appendChild(galleryOverlay);

      galleryImage = galleryOverlay.querySelector("[data-gallery-img]");
      galleryStatus = galleryOverlay.querySelector("[data-gallery-status]");
      galleryPrev = galleryOverlay.querySelector("[data-gallery-prev]");
      galleryNext = galleryOverlay.querySelector("[data-gallery-next]");
      galleryCounter = galleryOverlay.querySelector("[data-gallery-counter]");

      galleryOverlay.addEventListener("click", (e) => {
        if (e.target === galleryOverlay) closeGallery();
      });
      galleryOverlay.querySelector("[data-gallery-content]").addEventListener("click", (e) => e.stopPropagation());
      galleryOverlay.querySelector("[data-gallery-close]").addEventListener("click", closeGallery);
      [galleryPrev, galleryNext, galleryOverlay.querySelector("[data-gallery-close]")].forEach((btn) => {
        btn.addEventListener("mouseenter", () => {
          btn.style.background = "rgba(255,255,255,.22)";
          btn.style.borderColor = "rgba(255,255,255,.28)";
        });
        btn.addEventListener("mouseleave", () => {
          btn.style.background = "rgba(255,255,255,.12)";
          btn.style.borderColor = "rgba(255,255,255,.16)";
        });
      });
      galleryPrev.addEventListener("click", () => {
        if (gallery.index > 0) {
          gallery.index -= 1;
          renderGallery();
        }
      });
      galleryNext.addEventListener("click", () => {
        if (gallery.index < gallery.keys.length - 1) {
          gallery.index += 1;
          renderGallery();
        }
      });
    }

    function onGalleryKeyDown(e) {
      if (!gallery.isOpen) return;
      if (e.key === "Escape") {
        e.preventDefault();
        closeGallery();
      } else if (e.key === "ArrowLeft" && gallery.index > 0) {
        e.preventDefault();
        gallery.index -= 1;
        renderGallery();
      } else if (e.key === "ArrowRight" && gallery.index < gallery.keys.length - 1) {
        e.preventDefault();
        gallery.index += 1;
        renderGallery();
      }
    }

    function openGallery(keys, startIndex) {
      ensureGalleryOverlay();
      if (!Array.isArray(keys) || !keys.length) return;
      gallery.keys = keys;
      gallery.index = Math.max(0, Math.min(Number(startIndex) || 0, keys.length - 1));
      gallery.isOpen = true;
      galleryOverlay.style.display = "flex";
      document.body.style.overflow = "hidden";
      document.addEventListener("keydown", onGalleryKeyDown);
      renderGallery();
    }

    function closeGallery() {
      if (!galleryOverlay) return;
      gallery.isOpen = false;
      galleryOverlay.style.display = "none";
      document.body.style.overflow = "";
      document.removeEventListener("keydown", onGalleryKeyDown);
    }

    async function ensureUrl(key) {
      if (gallery.cache.has(key)) return gallery.cache.get(key);
      const r = await apiGet(`/api/uploads/presign-get?key=${encodeURIComponent(key)}`);
      const url = r?.url || (r?.ok ? r?.url : null);
      if (!url) throw new Error("presigned url missing");
      gallery.cache.set(key, url);
      return url;
    }

    async function ensureAvatarUrl(key) {
      if (!key) throw new Error("avatar key missing");
      if (avatarUrlCache.has(key)) return avatarUrlCache.get(key);
      const url = await ensureUrl(key);
      avatarUrlCache.set(key, url);
      return url;
    }

    function getInitials(username) {
      const text = String(username || "").trim();
      if (!text) return "?";
      const parts = text.split(/\s+/).filter(Boolean);
      if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
      return text.slice(0, 2).toUpperCase();
    }

    function resolveAvatarKeyForUserId(userId, fallbackAvatarKey = "") {
      const uid = Number(userId);
      if (!uid) return "";
      const avatarKey = avatarKeyByUserId.get(uid);
      if (avatarKey) return avatarKey;
      return typeof fallbackAvatarKey === "string" ? fallbackAvatarKey : "";
    }

    function createContactAvatar(username, avatarKey) {
      const avatar = document.createElement("div");
      avatar.className = "userAvatar";
      avatar.textContent = getInitials(username);

      if (!avatarKey) return avatar;

      ensureAvatarUrl(avatarKey)
        .then((url) => {
          if (!url) return;
          const img = document.createElement("img");
          img.src = url;
          img.alt = `Аватар ${username || "пользователя"}`;
          avatar.textContent = "";
          avatar.appendChild(img);
        })
        .catch(() => {
          avatar.textContent = getInitials(username);
        });

      return avatar;
    }

    function renderProfileMenuButton() {
      if (!elProfileMenuButton) return;
      const username = String(me || "").trim();
      const avatarKey = resolveAvatarKeyForUserId(meId, usersById.get(Number(meId))?.avatar_key || "");
      elProfileMenuButton.textContent = getInitials(username || "?");
      elProfileMenuButton.innerHTML = elProfileMenuButton.textContent;

      if (!avatarKey) return;

      ensureAvatarUrl(avatarKey)
        .then((url) => {
          if (!url || !elProfileMenuButton) return;
          const img = document.createElement("img");
          img.src = url;
          img.alt = `Аватар ${username || "пользователя"}`;
          elProfileMenuButton.textContent = "";
          elProfileMenuButton.appendChild(img);
        })
        .catch(() => {
          if (!elProfileMenuButton) return;
          elProfileMenuButton.textContent = getInitials(username || "?");
        });
    }

    function setProfileMenuOpen(open) {
      profileMenuOpen = !!open;
      if (!elProfileMenuPopup) return;
      elProfileMenuPopup.classList.toggle("hidden", !profileMenuOpen);
      elProfileMenuPopup.setAttribute("aria-hidden", profileMenuOpen ? "false" : "true");
    }

    async function handleProfileAvatarChange(file) {
      if (!file || !token) return;
      const isImage = String(file.type || "").toLowerCase().startsWith("image/");
      if (!isImage) {
        showToast("Выберите изображение");
        return;
      }

      const uploaded = await uploadAttachments([file]);
      const avatarKey = uploaded?.[0]?.key;
      if (!avatarKey) throw new Error("Не удалось получить ключ аватара");

      const response = await apiPost("/api/profile/avatar", { avatarKey });
      if (!response?.ok) throw new Error("Не удалось обновить аватар профиля");

      const myId = Number(
        (typeof currentUserId !== "undefined" ? currentUserId : null) ||
        me?.id ||
        meId ||
        localStorage.getItem("userId") ||
        localStorage.getItem("meId") ||
        0
      );

      if (myId) {
        avatarKeyByUserId.set(myId, avatarKey);

        const mappedUser = usersById.get(myId);
        if (mappedUser) mappedUser.avatar_key = avatarKey;

        const meUser = usersById.get(myId) || { id: myId, username: String(me || ""), avatar_key: "" };
        meUser.avatar_key = avatarKey;
        usersById.set(myId, meUser);
      }

      if (avatarUrlCache?.clear) avatarUrlCache.clear();

      await loadUsersDirectory();
      renderContacts(contactsCache);
      renderProfileMenuButton();

      console.log("avatar updated", { myId, avatarKey });
      showToast("Аватар обновлён");
    }

    async function loadUsersDirectory() {
      const r = await apiGet("/api/users");
      const users = Array.isArray(r?.users) ? r.users : [];

      usersById.clear();
      avatarKeyByUserId.clear();

      users.forEach((user) => {
        const uid = Number(user?.id);
        if (!uid) return;
        const avatarKey = typeof user?.avatar_key === "string" ? user.avatar_key.trim() : "";

        usersById.set(uid, {
          id: uid,
          username: String(user?.username || ""),
          avatar_key: avatarKey,
        });

        if (avatarKey) avatarKeyByUserId.set(uid, avatarKey);
      });

      return users;
    }

    async function renderGallery() {
      if (!gallery.isOpen || !galleryOverlay) return;
      const total = gallery.keys.length;
      const currentKey = gallery.keys[gallery.index];
      if (!currentKey) return;

      galleryCounter.textContent = `${gallery.index + 1} / ${total}`;
      galleryPrev.disabled = gallery.index <= 0;
      galleryNext.disabled = gallery.index >= total - 1;
      galleryImage.style.display = "none";
      galleryImage.removeAttribute("src");
      galleryStatus.textContent = "Загрузка…";
      galleryStatus.style.display = "block";

      const expectedKey = currentKey;
      try {
        const url = await ensureUrl(expectedKey);
        if (!gallery.isOpen || gallery.keys[gallery.index] !== expectedKey) return;
        galleryImage.src = url;
        galleryImage.style.display = "block";
        galleryStatus.style.display = "none";
      } catch (e) {
        if (!gallery.isOpen || gallery.keys[gallery.index] !== expectedKey) return;
        galleryStatus.textContent = `Не удалось открыть вложение (${e.message || "ошибка"})`;
        galleryStatus.style.display = "block";
      }
    }

    function getAttachmentGroupId(m) {
      if (m?.id != null) return `msg:${Number(m.id)}`;
      return `tmp:${Number(m?.fromUserId || 0)}:${Number(m?.ts || Date.now())}:${String(m?.text || "").slice(0, 16)}`;
    }

    function collectAttachmentItems(attachments) {
      return (Array.isArray(attachments) ? attachments : [])
        .map((a, idx) => ({
          key: a?.key || "",
          type: a?.type || null,
          name: a?.name || "",
          size: Number(a?.size) || 0,
          order: Number.isFinite(Number(a?.order)) ? Number(a.order) : idx,
        }))
        .filter((a) => a.key)
        .sort((a, b) => a.order - b.order);
    }

    function resolveRenderAttachments(message) {
      const hasArrayAttachments = Array.isArray(message?.attachments) && message.attachments.length > 0;
      if (hasArrayAttachments) return collectAttachmentItems(message.attachments);
      if (message?.attachment_key) {
        return collectAttachmentItems([{
          key: message.attachment_key,
          type: message.attachment_type || "file",
          order: 0,
        }]);
      }
      return [];
    }

    function isAudioAttachmentType(type) {
      const normalized = String(type || "").toLowerCase();
      return normalized === "audio" || normalized.startsWith("audio");
    }

    function formatAudioTime(seconds) {
      const safe = Number.isFinite(seconds) && seconds >= 0 ? Math.floor(seconds) : 0;
      const mins = Math.floor(safe / 60);
      const secs = safe % 60;
      return `${String(mins).padStart(2, "0")}:${String(secs).padStart(2, "0")}`;
    }

    function getAudioPlayerEl(key, messageId) {
      if (!key || !messageId) return null;
      return document.querySelector(`.audioPlayer[data-audio-key="${CSS.escape(key)}"][data-audio-msgid="${CSS.escape(messageId)}"]`);
    }

    function updateAudioUi(key, messageId, { isPlaying = false, currentTime = 0, duration = 0 } = {}) {
      const playerEl = getAudioPlayerEl(key, messageId);
      if (!playerEl) return;
      const btn = playerEl.querySelector(".audioBtn");
      const fill = playerEl.querySelector(".audioBarFill");
      const time = playerEl.querySelector(".audioTime");
      const safeDuration = Number.isFinite(duration) && duration > 0 ? duration : 0;
      const safeCurrent = Number.isFinite(currentTime) && currentTime >= 0 ? currentTime : 0;
      const percent = safeDuration > 0 ? Math.max(0, Math.min(100, (safeCurrent / safeDuration) * 100)) : 0;

      if (btn) btn.textContent = isPlaying ? "⏸" : "▶︎";
      if (fill) fill.style.width = `${percent}%`;
      if (time) time.textContent = `${formatAudioTime(safeCurrent)} / ${formatAudioTime(safeDuration)}`;
    }

    function resetPlayingAudioUi() {
      if (!playingAudioKey || !playingAudioMsgId) return;
      const duration = Number.isFinite(audioPlayer.duration) ? audioPlayer.duration : 0;
      updateAudioUi(playingAudioKey, playingAudioMsgId, { isPlaying: false, currentTime: 0, duration });
    }

    async function ensureAudioUrl(key) {
      if (audioUrlCache.has(key)) return audioUrlCache.get(key);
      const r = await apiGet(`/api/uploads/presign-get?key=${encodeURIComponent(key)}`);
      const url = r?.url || null;
      if (!url) throw new Error("presigned url missing");
      console.log("audio presigned url", url);
      audioUrlCache.set(key, url);
      return url;
    }

    async function toggleAudioPlayback(key, messageId, attachmentType = "") {
      if (!key || !messageId) return;
      const isCurrent = playingAudioKey === key && playingAudioMsgId === messageId;
      if (audioIsStarting && isCurrent) return;

      if (isCurrent && !audioPlayer.paused) {
        audioPlayToken += 1;
        audioPlayer.pause();
        audioIsStarting = false;
        updateAudioUi(key, messageId, {
          isPlaying: false,
          currentTime: audioPlayer.currentTime,
          duration: audioPlayer.duration,
        });
        return;
      }

      let url;
      try {
        url = await ensureAudioUrl(key);
      } catch (e) {
        const audioEl = audioPlayer;
        console.error("audio open failed", {
          key,
          err: String(e?.message || e),
          stack: e?.stack,
          audioSrc: audioEl?.src,
        });
        showToast("Не удалось открыть аудио");
        return;
      }

      const previousAudioKey = playingAudioKey;
      const previousAudioMsgId = playingAudioMsgId;
      if (!isCurrent && previousAudioKey && previousAudioMsgId) {
        resetPlayingAudioUi();
      }

      audioPlayToken += 1;
      const token = audioPlayToken;
      audioIsStarting = true;

      if (currentAudioKey !== key) {
        const normalizedType = normalizeContentType(attachmentType || "audio/webm");
        const sourceType = normalizedType.includes("/") ? normalizedType : "audio/webm";

        audioPlayer.pause();
        audioPlayer.currentTime = 0;
        audioPlayer.removeAttribute("src");
        while (audioPlayer.firstChild) audioPlayer.removeChild(audioPlayer.firstChild);

        const srcEl = document.createElement("source");
        srcEl.src = url;
        srcEl.type = sourceType;
        audioPlayer.appendChild(srcEl);

        audioPlayer.load();
        currentAudioKey = key;

        console.log("audio source set", {
          src: srcEl.src,
          type: srcEl.type,
          canPlay: audioPlayer.canPlayType(srcEl.type),
        });
      }

      playingAudioKey = key;
      playingAudioMsgId = messageId;

      try {
        const audioEl = audioPlayer;
        const playPromise = audioEl.play();
        if (playPromise && typeof playPromise.then === "function") await playPromise;
        if (token !== audioPlayToken) return;

        updateAudioUi(key, messageId, {
          isPlaying: true,
          currentTime: audioPlayer.currentTime,
          duration: audioPlayer.duration,
        });
      } catch (e) {
        if (e?.name === "AbortError") {
          console.log("audio play aborted", { key, messageId });
          return;
        }
        const audioEl = audioPlayer;
        console.error("audio open failed", {
          key,
          err: String(e?.message || e),
          stack: e?.stack,
          audioSrc: audioEl?.src,
        });
        showToast("Не удалось открыть аудио");
      } finally {
        if (token === audioPlayToken) audioIsStarting = false;
      }
    }

    function seekAudioPlayback(key, messageId, event) {
      if (playingAudioKey !== key || playingAudioMsgId !== messageId) return;
      const bar = event.currentTarget;
      const duration = audioPlayer.duration;
      if (!bar || !Number.isFinite(duration) || duration <= 0) return;
      const rect = bar.getBoundingClientRect();
      if (!rect.width) return;
      const ratio = (event.clientX - rect.left) / rect.width;
      const clampedRatio = Math.max(0, Math.min(1, ratio));
      audioPlayer.currentTime = duration * clampedRatio;
      updateAudioUi(key, messageId, {
        isPlaying: !audioPlayer.paused,
        currentTime: audioPlayer.currentTime,
        duration: audioPlayer.duration,
      });
    }

    audioPlayer.addEventListener("loadedmetadata", () => {
      if (!playingAudioKey || !playingAudioMsgId) return;
      updateAudioUi(playingAudioKey, playingAudioMsgId, {
        isPlaying: !audioPlayer.paused,
        currentTime: audioPlayer.currentTime,
        duration: audioPlayer.duration,
      });
    });

    audioPlayer.addEventListener("timeupdate", () => {
      if (!playingAudioKey || !playingAudioMsgId) return;
      updateAudioUi(playingAudioKey, playingAudioMsgId, {
        isPlaying: !audioPlayer.paused,
        currentTime: audioPlayer.currentTime,
        duration: audioPlayer.duration,
      });
    });

    audioPlayer.addEventListener("ended", () => {
      if (!playingAudioKey || !playingAudioMsgId) return;
      const endedKey = playingAudioKey;
      const endedMsgId = playingAudioMsgId;
      playingAudioKey = null;
      playingAudioMsgId = null;
      updateAudioUi(endedKey, endedMsgId, { isPlaying: false, currentTime: 0, duration: audioPlayer.duration });
      audioPlayer.currentTime = 0;
    });

    function renderMessageAttachments(wrap, message, isDeleted) {
      const renderAttachments = isDeleted ? [] : resolveRenderAttachments(message);
      const messageId = getAttachmentGroupId(message);
      if (!renderAttachments.length) {
        messageAttachmentKeys.delete(messageId);
        return;
      }

      messageAttachmentKeys.set(messageId, renderAttachments.map((a) => a.key));
      const imageAttachments = renderAttachments.filter((a) => {
        const type = String(a.type || "").toLowerCase();
        return type === "image" || type.startsWith("image");
      }).slice(0, 4);
      const audioAttachments = renderAttachments.filter((a) => isAudioAttachmentType(a.type));
      const fileAttachments = renderAttachments.filter((a) => {
        const type = String(a.type || "").toLowerCase();
        return !(type === "image" || type.startsWith("image") || isAudioAttachmentType(type));
      });

      const attachWrap = document.createElement("div");
      attachWrap.className = "attachList";

      if (imageAttachments.length) {
        const grid = document.createElement("div");
        grid.className = "attGrid";
        imageAttachments.forEach((att) => {
          const tile = document.createElement("div");
          tile.className = "attTile imageTile";
          tile.dataset.attachKey = att.key;
          tile.dataset.attachMsgid = messageId;
          tile.dataset.attachType = att.type || "image";

          const skeleton = document.createElement("div");
          skeleton.className = "attSkeleton";

          const thumb = document.createElement("img");
          thumb.className = "attThumb";
          thumb.alt = "Вложение";
          thumb.loading = "lazy";
          thumb.decoding = "async";
          thumb.style.opacity = "0";
          thumb.style.visibility = "hidden";

          tile.append(skeleton, thumb);

          thumb.addEventListener("load", () => {
            skeleton.style.opacity = "0";
            skeleton.style.visibility = "hidden";
            thumb.style.opacity = "1";
            thumb.style.visibility = "visible";
            if (isNearBottom(elMessages, 80)) scrollToBottom();
          });
          thumb.addEventListener("error", () => {
            // Оставляем skeleton для неуспешных загрузок
          });

          ensureUrl(att.key)
            .then((url) => {
              if (!tile.isConnected || !url) return;
              thumb.src = url;
              console.log("thumb src set", url.slice(0, 60));
            })
            .catch(() => {
              // Оставляем skeleton для неуспешных загрузок
            });

          grid.appendChild(tile);
        });
        attachWrap.appendChild(grid);
      }

      if (audioAttachments.length) {
        audioAttachments.forEach((att) => {
          const player = document.createElement("div");
          player.className = "audioPlayer";
          player.dataset.audioKey = att.key;
          player.dataset.audioMsgid = messageId;
          player.dataset.audioType = att.type || "";

          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "audioBtn";
          btn.dataset.audioToggle = "1";
          btn.textContent = "▶︎";

          const bar = document.createElement("div");
          bar.className = "audioBar";
          bar.dataset.audioSeek = "1";

          const fill = document.createElement("div");
          fill.className = "audioBarFill";
          bar.appendChild(fill);

          const time = document.createElement("div");
          time.className = "audioTime";
          time.textContent = "00:00 / 00:00";

          player.append(btn, bar, time);
          attachWrap.appendChild(player);
        });
      }

      if (fileAttachments.length) {
        const fileList = document.createElement("div");
        fileList.className = "attFileList";
        fileAttachments.forEach((att) => {
          const row = document.createElement("div");
          row.className = "attFileRow";

          const fileDisplayName = prettyFilenameFromKey(att.key);

          const name = document.createElement("div");
          name.className = "attFileName";
          name.textContent = `📎 ${fileDisplayName}`;
          name.title = fileDisplayName;

          const downloadBtn = document.createElement("button");
          downloadBtn.type = "button";
          downloadBtn.className = "attFileDownload";
          downloadBtn.dataset.attachDownload = "1";
          downloadBtn.dataset.attachKey = att.key;
          downloadBtn.dataset.attachMsgid = messageId;
          downloadBtn.dataset.attachType = att.type || "file";
          downloadBtn.dataset.attachFilename = fileDisplayName;
          downloadBtn.textContent = "Скачать";

          row.append(name, downloadBtn);
          fileList.appendChild(row);
        });
        attachWrap.appendChild(fileList);
      }

      wrap.appendChild(attachWrap);
    }

    function normalizeReactions(rawReactions) {
      if (!Array.isArray(rawReactions)) return [];
      return rawReactions
        .map((r) => {
          const emoji = typeof r?.emoji === "string" ? r.emoji : "";
          const count = Number(r?.count);
          return {
            emoji,
            count: Number.isFinite(count) ? count : 0,
            mine: !!r?.mine,
          };
        })
        .filter((r) => r.emoji && r.count > 0);
    }

    function ensureReactionPopover() {
      if (reactionPopoverEl) return reactionPopoverEl;
      const pop = document.createElement("div");
      pop.className = "reactionPopover";
      pop.setAttribute("role", "menu");

      REACTION_EMOJIS.forEach((emoji) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.textContent = emoji;
        btn.setAttribute("aria-label", `Реакция ${emoji}`);
        btn.addEventListener("click", () => {
          if (!activeReactionPopover) return;
          const { mode, messageId, groupId } = activeReactionPopover;
          if (!socket || !messageId) return;
          if (mode === "group") {
            socket.emit("groupMessage:react", { groupId: Number(groupId), messageId: Number(messageId), emoji });
          } else {
            socket.emit("message:react", { messageId: Number(messageId), emoji });
          }
          closeReactionPopover();
        });
        pop.appendChild(btn);
      });

      document.body.appendChild(pop);
      reactionPopoverEl = pop;
      return pop;
    }

    function closeReactionPopover() {
      if (!activeReactionPopover || !reactionPopoverEl) return;
      const { onDocClick, onDocKeyDown, onWindowClose } = activeReactionPopover;
      document.removeEventListener("click", onDocClick, true);
      document.removeEventListener("keydown", onDocKeyDown, true);
      window.removeEventListener("resize", onWindowClose, true);
      elMessages.removeEventListener("scroll", onWindowClose, true);
      reactionPopoverEl.style.display = "none";
      activeReactionPopover = null;
    }

    function openReactionPopover(anchorEl, payload) {
      closeReactionPopover();
      if (!anchorEl || !payload?.messageId) return;
      const pop = ensureReactionPopover();
      pop.style.display = "inline-flex";
      const r = anchorEl.getBoundingClientRect();
      const popRect = pop.getBoundingClientRect();
      const top = Math.min(window.innerHeight - popRect.height - 8, r.bottom + 6);
      const left = Math.max(8, Math.min(window.innerWidth - popRect.width - 8, r.left));
      pop.style.top = `${Math.max(8, top)}px`;
      pop.style.left = `${left}px`;

      const onDocClick = (e) => {
        if (!pop.contains(e.target)) closeReactionPopover();
      };
      const onDocKeyDown = (e) => {
        if (e.key === "Escape") closeReactionPopover();
      };
      const onWindowClose = () => closeReactionPopover();

      document.addEventListener("click", onDocClick, true);
      document.addEventListener("keydown", onDocKeyDown, true);
      window.addEventListener("resize", onWindowClose, true);
      elMessages.addEventListener("scroll", onWindowClose, true);

      activeReactionPopover = { ...payload, onDocClick, onDocKeyDown, onWindowClose };
    }

    function emitMessageReaction(mode, messageId, emoji, groupId) {
      if (!socket || !messageId || !emoji) return;
      if (mode === "group") {
        socket.emit("groupMessage:react", { groupId: Number(groupId), messageId: Number(messageId), emoji });
      } else {
        socket.emit("message:react", { messageId: Number(messageId), emoji });
      }
    }

    function buildReactionsRow(m, mode) {
      const isDeleted = !!(m?.deletedAt || m?.deleted_at);
      const messageId = Number(m?.id);
      if (isDeleted || !Number.isFinite(messageId) || messageId <= 0) return null;

      const reactions = normalizeReactions(m?.reactions);
      if (!reactions.length) return null;
      const row = document.createElement("div");
      row.className = "reactionsRow";

      const list = document.createElement("div");
      list.className = "reactionsList";
      reactions.forEach((reaction) => {
        const pill = document.createElement("span");
        pill.className = "reactPill" + (reaction.mine ? " mine" : "");
        pill.textContent = `${reaction.emoji} ${reaction.count}`;
        pill.addEventListener("click", (e) => {
          e.stopPropagation();
          emitMessageReaction(mode, messageId, reaction.emoji, mode === "group" ? Number(activeChat?.groupId) : null);
        });
        list.appendChild(pill);
      });
      row.appendChild(list);

      return row;
    }

    function createReactAddBtn(message, mode, groupId) {
      const messageId = Number(message?.id);
      if (!Number.isFinite(messageId) || messageId <= 0) return null;

      const addBtn = document.createElement("button");
      addBtn.type = "button";
      addBtn.className = "reactAddBtn";
      addBtn.title = "Реакция";
      addBtn.dataset.reactAdd = "1";
      addBtn.dataset.messageId = String(messageId);
      addBtn.dataset.chatKind = mode;
      if (mode === "group" && Number.isFinite(Number(groupId))) {
        addBtn.dataset.groupId = String(Number(groupId));
      }
      addBtn.textContent = "😊";
      addBtn.setAttribute("aria-label", "Добавить реакцию");
      addBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        const payload = {
          mode,
          messageId,
          groupId: mode === "group" ? Number(groupId) : null,
        };
        openReactionPopover(addBtn, payload);
        if (!reactionPopoverEl || reactionPopoverEl.style.display !== "inline-flex") {
          emitMessageReaction(mode, messageId, "👍", mode === "group" ? Number(groupId) : null);
        }
      });
      return addBtn;
    }

    function resolveCreatedMs(m) {
      const created = m?.createdAtMs ?? m?.created_at_ms ?? m?.createdAt ?? m?.created_at ?? m?.ts;
      if (typeof created === "number") return created;
      if (created instanceof Date) return created.getTime();
      if (typeof created === "string") {
        const parsed = Date.parse(created);
        return Number.isFinite(parsed) ? parsed : NaN;
      }
      return NaN;
    }

    function canManageMessage(m) {
      const fromUserId = Number(m?.fromUserId ?? m?.from_user_id);
      if (!meId || fromUserId !== Number(meId)) return false;
      if (m?.deletedAt || m?.deleted_at) return false;
      const createdMs = resolveCreatedMs(m);
      if (!Number.isFinite(createdMs)) return false;
      return Date.now() - createdMs <= 60 * 60 * 1000;
    }

    function closeInlineEdit(wrap, restoreText) {
      if (!wrap) return;
      const editBox = wrap.querySelector(".editBox");
      if (!editBox) return;
      const body = wrap.querySelector(".text");
      const actions = wrap.querySelector(".editActions");
      if (restoreText != null && body) body.textContent = restoreText;
      if (body) body.style.display = "";
      editBox.remove();
      if (actions) actions.remove();
    }

    function closeMsgMenu() {
      if (!activeMsgMenu) return;
      document.removeEventListener("click", activeMsgMenu.onDocClick, true);
      document.removeEventListener("keydown", activeMsgMenu.onDocKeyDown, true);
      window.removeEventListener("resize", activeMsgMenu.onWindowClose, true);
      elMessages.removeEventListener("scroll", activeMsgMenu.onWindowClose, true);
      activeMsgMenu.el.remove();
      activeMsgMenu = null;
    }

    function openInlineEdit({ wrap, message, mode }) {
      closeMsgMenu();
      if (!wrap || !message) return;
      if (wrap.querySelector(".editBox")) return;
      const body = wrap.querySelector(".text");
      if (!body || body.classList.contains("isDeleted")) return;
      const originalText = typeof message.text === "string" ? message.text : (body.textContent || "");

      const editBox = document.createElement("textarea");
      editBox.className = "editBox";
      editBox.maxLength = 2000;
      editBox.value = originalText;

      const actions = document.createElement("div");
      actions.className = "editActions";
      const saveBtn = document.createElement("button");
      saveBtn.type = "button";
      saveBtn.textContent = "Сохранить";
      const cancelBtn = document.createElement("button");
      cancelBtn.type = "button";
      cancelBtn.textContent = "Отмена";
      cancelBtn.className = "btnGhost";
      actions.appendChild(saveBtn);
      actions.appendChild(cancelBtn);

      const cancel = () => closeInlineEdit(wrap, originalText);

      const save = () => {
        const newText = editBox.value.trim().slice(0, 2000);
        if (!newText || newText === originalText.trim()) {
          cancel();
          return;
        }

        const payload = { messageId: Number(message.id), newText };
        if (mode === "group") payload.groupId = Number(activeChat?.groupId);

        try {
          if (mode === "group") socket.emit("groupMessage:edit", payload);
          else socket.emit("message:edit", payload);
        } finally {
          closeInlineEdit(wrap);
        }
      };

      saveBtn.addEventListener("click", save);
      cancelBtn.addEventListener("click", cancel);
      editBox.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          e.preventDefault();
          cancel();
          return;
        }
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          save();
        }
      });

      body.style.display = "none";
      body.insertAdjacentElement("afterend", editBox);
      editBox.insertAdjacentElement("afterend", actions);
      editBox.focus();
      editBox.selectionStart = editBox.value.length;
      editBox.selectionEnd = editBox.value.length;
    }

    function openMsgMenu({ btn, wrap, message, mode }) {
      closeMsgMenu();
      if (!btn || !wrap || !message) return;

      const hasAttachment = !!message.attachment_key || !!message.attachment_type;

      menu.className = "msgMenu";

      const editBtn = document.createElement("button");

      menu.appendChild(deleteBtn);

      const r = btn.getBoundingClientRect();
      const menuRect = menu.getBoundingClientRect();
      const top = Math.min(window.innerHeight - menuRect.height - 8, r.bottom + 6);
      const left = Math.max(8, Math.min(window.innerWidth - menuRect.width - 8, r.right - menuRect.width));
      menu.style.top = `${Math.max(8, top)}px`;
      menu.style.left = `${left}px`;

      if (!hasAttachment) {
        editBtn.addEventListener("click", () => {

        } else {
          socket.emit("message:delete", { messageId: Number(message.id) });
        }
        closeMsgMenu();
      });

      const onDocClick = (e) => {
        if (!menu.contains(e.target)) closeMsgMenu();
      };
      const onDocKeyDown = (e) => {
        if (e.key === "Escape") closeMsgMenu();
      };
      const onWindowClose = () => closeMsgMenu();

      document.addEventListener("click", onDocClick, true);
      document.addEventListener("keydown", onDocKeyDown, true);

    async function removeActiveContact() {
      const targetUserId = Number(activeChat?.userId);
      if (!token || activeChat?.type !== "dm" || !targetUserId) return;
      if (!confirm("Удалить из друзей?")) return;

      try {
        const headers = { Authorization: "Bearer " + token };
        const res = await fetch(`/api/contacts/${targetUserId}`, { method: "DELETE", headers });
        const json = await res.json().catch(() => ({}));
        if (!res.ok || json?.ok === false) throw new Error(json.error || `HTTP ${res.status}`);

        showToast("Удалено из друзей");
        const contacts = await loadContacts().catch(() => []);
        contactsCache = contacts;
        renderContacts(contactsCache);
      } catch (e) {
        showToast(e?.message ? `Ошибка: ${e.message}` : "Не удалось удалить из друзей");

    }

      const gid = Number(activeChat.groupId);

    function resolveActiveGroupCreatedBy() {
      if (!activeChat || activeChat.type !== "group") return null;
      const direct = Number(activeChat.createdBy ?? activeChat.created_by);
      if (Number.isFinite(direct) && direct > 0) return direct;
      const fallbackGroup = getGroupById(activeChat.groupId);
      const fallback = Number(fallbackGroup?.created_by ?? fallbackGroup?.createdBy);
      return Number.isFinite(fallback) && fallback > 0 ? fallback : null;
    }

      if (!activeChat || activeChat.type !== "group" || !meId) return false;

    async function ensureGroupMembersLoaded(groupId, force = false) {
      const gid = Number(groupId);
      if (!gid || !token) return null;
      if (!force && groupMembersCache[gid]) {
        updateGroupMembersButton();
        return groupMembersCache[gid];
      }
      if (groupMembersLoading.has(gid)) return null;
      groupMembersLoading.add(gid);
      updateGroupMembersButton();
      try {
        const json = await apiGet(`/api/groups/${gid}/members`);
        groupMembersCache[gid] = {
          groupId: gid,
          created_by: Number(json?.created_by),
          members: Array.isArray(json?.members) ? json.members.map((m) => ({ id: Number(m.id), username: m.username })) : [],
        };
        return groupMembersCache[gid];
      } finally {
        groupMembersLoading.delete(gid);
        updateGroupMembersButton();
      }
    }

    function renderGroupMembersModal() {
      if (!elGroupMembersList || !activeChat || activeChat.type !== "group") return;
      const gid = Number(activeChat.groupId);
      const data = groupMembersCache[gid];
      elGroupMembersList.innerHTML = "";
      if (!data || !Array.isArray(data.members)) {
        const empty = document.createElement("div");

function formatLastSeen(lastSeenAt) {
  if (!lastSeenAt) return "offline";

  const t = new Date(lastSeenAt).getTime();
  if (!Number.isFinite(t)) return "offline";

  const diffMs = Date.now() - t;
  const mins = Math.floor(diffMs / 60000);

  if (mins < 1) return "был(а) только что";
  if (mins === 1) return "был(а) 1 минуту назад";
  if (mins < 5) return `был(а) ${mins} минуты назад`;
  if (mins < 60) return `был(а) ${mins} минут назад`;

  const hours = Math.floor(mins / 60);
  if (hours === 1) return "был(а) 1 час назад";
  if (hours < 5) return `был(а) ${hours} часа назад`;
  return `был(а) ${hours} часов назад`;
}
